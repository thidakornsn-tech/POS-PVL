function genId(prefix = "id") {
  return prefix + "_" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
}
function formatCurrency(n) {
  if (n === null || n === undefined || n === "" || isNaN(n)) return "—";

}
function formatDateTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString(undefined, { year: "numeric", month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}
function formatDate(iso) {
  if (!iso) return "—";

}

function allocatedEventStock(p) {
  return (p.eventAllocations || []).reduce((sum, ea) => sum + Math.max(0, ea.allocated - ea.returned), 0);
}
function availableStock(p) {
  return (p.currentStock || 0) - allocatedEventStock(p);
}
function activePromotion(p) {
  if (!p.activePromotionId) return null;
  const promo = (p.promotions || []).find(pr => pr.id === p.activePromotionId);
  return promo && promo.active ? promo : null;
}

/* -------- fuzzy header matching for smart import -------- */
const FIELD_LABELS = {
  brand: "Brand",
  name: "Product Name",
  barcode: "Barcode",
  sku: "Product Code / SKU",
  rrpPrice: "RRP Price",
  currentStock: "Current Stock",
  promo: "Promotion Price",
};
// Columns named "Promotion <Name>" (e.g. "Promotion Trade In", "Promotion Galaxy")
// are auto-detected as per-promotion price columns — one column per promotion,
// the column header supplies the promotion's name and each cell is that
// product's price under that promotion (blank/0 = not enrolled).
function detectPromotionHeader(header) {
  const raw = String(header || "").trim();
  const m = raw.match(/^promo(?:tion)?s?\s*[:\-]?\s+(.+)$/i);
  if (!m) return null;
  let name = m[1].trim();
  name = name.replace(/\s*price\s*$/i, "").trim();
  return name || null;
}
const FIELD_SYNONYMS = {
  brand: ["brand", "brands", "product brand", "vendor", "manufacturer", "make", "supplier", "maker", "brand name"],
  name: ["product name", "name", "item", "item name", "description", "product", "item description", "title", "product title", "product description"],
  barcode: ["barcode", "bar code", "ean", "ean13", "ean 13", "upc", "gtin", "scan code"],
  sku: ["sku", "product code", "item code", "model", "code", "product sku", "part number", "part no", "productcode", "itemcode", "item no", "model number"],
  rrpPrice: ["price", "retail", "retail price", "rrp", "msrp", "selling price", "unit price", "list price", "sale price", "sell price", "cost price", "unit retail"],
  currentStock: ["stock", "qty", "quantity", "inventory", "on hand", "onhand", "on-hand", "available", "stock qty", "stock quantity", "units", "in stock", "current stock", "quantity on hand"],
};
function normalizeHeader(h) {
  return String(h || "").toLowerCase().trim().replace(/[_\-\.\/]+/g, " ").replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();
}
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n; if (n === 0) return m;
  const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
    }
  }
  return dp[m][n];
}
function similarity(a, b) {
  const dist = levenshtein(a, b);
  const maxLen = Math.max(a.length, b.length, 1);
  return 1 - dist / maxLen;
}
function guessFieldForHeader(header) {
  const norm = normalizeHeader(header);
  if (!norm) return { field: null, confidence: 0 };
  let best = { field: null, confidence: 0 };
  for (const [field, syns] of Object.entries(FIELD_SYNONYMS)) {
    for (const syn of syns) {
      if (norm === syn) return { field, confidence: 1 };
      // Only match when the (longer) header contains the full synonym phrase —
      // NOT the reverse. Matching "syn.includes(norm)" would let a short,
      // generic header like "Unit" false-positive against a longer synonym
      // like "unit price" purely because "unit" is a substring of it.
      if (norm.includes(syn) && syn.length >= 3) {
        if (0.9 > best.confidence) best = { field, confidence: 0.9 };
      } else {
        const sim = similarity(norm, syn);
        if (sim > 0.72 && sim > best.confidence) best = { field, confidence: sim * 0.8 };
      }
    }
  }
  return best;
}
function autoMapHeaders(headers) {
  // Promotion price columns ("Promotion Trade In", "Promo Galaxy", ...) are
  // detected first and pulled out of the pool entirely, so they can never be
  // stolen by (or steal) a normal single-value field like rrpPrice.
  const promoHeaders = new Set(headers.filter(h => detectPromotionHeader(h)));
  const normalHeaders = headers.filter(h => !promoHeaders.has(h));

  const guesses = normalHeaders.map(h => ({ header: h, ...guessFieldForHeader(h), normLen: normalizeHeader(h).length }));
  const byField = {};
  guesses.forEach(g => {
    if (!g.field) return;
    const existing = byField[g.field];
    // On a confidence tie (e.g. a generic "Item" column vs. a specific "Product Name"
    // column both matching exactly), prefer the more descriptive/longer header.
    if (!existing || g.confidence > existing.confidence || (g.confidence === existing.confidence && g.normLen > existing.normLen)) {
      if (existing) existing.field = null;
      byField[g.field] = g;
    } else {
      g.field = null;
    }
  });
  const normalResult = guesses.map(g => ({ header: g.header, field: g.field }));
  const promoResult = headers.filter(h => promoHeaders.has(h)).map(h => ({ header: h, field: "promo" }));
  // Preserve original header order in the returned array.
  const byHeader = new Map([...normalResult, ...promoResult].map(g => [g.header, g]));
  return headers.map(h => byHeader.get(h));
}

/* -------- Header-row auto-detection --------
   Real-world spreadsheets often have a title/letterhead block (company name,
   report date, etc.) above the real column headers. Scan the first ~20 rows
   and pick the one that looks most like a header row (most cells matching a
   known field), instead of blindly assuming row 1 is the header. */
function findHeaderRowIndex(rows) {
  const maxScan = Math.min(20, rows.length);
  let best = { index: -1, score: -1, hasName: false };
  for (let i = 0; i < maxScan; i++) {
    const row = rows[i] || [];
    if (row.every(c => String(c == null ? "" : c).trim() === "")) continue;
    let score = 0, hasName = false, matchedCount = 0;
    row.forEach(cell => {
      const g = guessFieldForHeader(cell);
      if (g.field) { score += g.confidence; matchedCount++; if (g.field === "name") hasName = true; }
    });
    const qualifies = matchedCount >= 2 || (matchedCount >= 1 && hasName);
    if (qualifies && (score > best.score || (score === best.score && hasName && !best.hasName))) {
      best = { index: i, score, hasName };
    }
  }
  return best.index >= 0 ? best.index : 0; // fall back to row 1 if nothing scores
}
// Convert raw array-of-arrays rows into { headers, rows } objects, using the
// auto-detected header row and skipping fully-blank rows (letterhead gaps,
// trailing blank rows, etc.).
function rowsToObjects(rawRows) {
  const headerRowIdx = findHeaderRowIndex(rawRows);
  const headerRow = rawRows[headerRowIdx] || [];
  const seen = {};
  const cols = [];
  headerRow.forEach((h, idx) => {
    let label = String(h == null ? "" : h).trim();
    if (!label) return;
    if (seen[label] != null) { seen[label]++; label = `${label} (${seen[label]})`; } else seen[label] = 1;
    cols.push({ idx, label });
  });
  const dataRows = [];
  for (let r = headerRowIdx + 1; r < rawRows.length; r++) {
    const row = rawRows[r];
    if (!row || row.every(c => String(c == null ? "" : c).trim() === "")) continue;
    const obj = {};
    cols.forEach(c => { obj[c.label] = row[c.idx]; });
    dataRows.push(obj);
  }
  return { headers: cols.map(c => c.label), rows: dataRows, headerRowIdx };
}
function parseNumberLoose(v) {
  if (v === null || v === undefined) return null;
  if (typeof v === "number") return isNaN(v) ? null : v;
  const cleaned = String(v).replace(/[^0-9.\-]/g, "");
  if (cleaned === "" || cleaned === "-") return null;
  const n = parseFloat(cleaned);
  return isNaN(n) ? null : n;
}

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

function buildProduct({ brand, name, barcode, sku, rrpPrice, currentStock }) {
  return {
    id: genId("p"),
    brand: brand || "",
    name,
    barcode: barcode || "",
    sku: sku || "",
    rrpPrice: rrpPrice ?? null,
    currentStock: currentStock ?? 0,
    promotions: [],
    activePromotionId: null,
    eventAllocations: [],
    stockHistory: [{ id: genId("h"), date: new Date(Date.now() - randInt(1, 60) * 86400000).toISOString(), user: "System Import", action: "Import", qty: currentStock ?? 0, remark: "Initial stock from import", resultingStock: currentStock ?? 0 }],

  };
}

    location: pick(["Bangkok", "Chiang Mai", "Phuket", "Pattaya", "Khon Kaen", "Hat Yai"]),
  }));
}

function generateSeedProducts(events, count = 3000) {
  const products = [];

  // guaranteed demo items referenced in spec examples
  const guaranteed = [
    { brand: "Warrior", name: "Grip Sock", sku: "WAR-GS-001", barcode: "8850001112223", rrpPrice: 390, currentStock: 120 },
    { brand: "Nike", name: "Superlight Sock", sku: "NKE-SLS-014", barcode: "8850001112224", rrpPrice: 290, currentStock: 60 },
    { brand: "Adidas", name: "Classic Sock", sku: "ADI-CLS-022", barcode: "8850001112225", rrpPrice: 250, currentStock: 8 },
    { brand: "Puma", name: "Elite X", sku: "PUM-ELX-101", barcode: "8850001112226", rrpPrice: 3290, currentStock: 15 },
    { brand: "Puma", name: "Elite Pro", sku: "PUM-ELP-102", barcode: "8850001112227", rrpPrice: 3690, currentStock: 0 },
  ];
  guaranteed.forEach(g => products.push(buildProduct(g)));

  for (let i = 0; i < count - guaranteed.length; i++) {
    const brand = pick(BRANDS);
    const type = pick(TYPES);
    const adj = pick(ADJ);
    const name = Math.random() > 0.5 ? `${adj} ${type}` : `${type} ${adj}`;
    const sku = `${brand.slice(0, 3).toUpperCase()}-${type.slice(0, 2).toUpperCase()}${randInt(100, 999)}`;
    const barcode = "88" + String(randInt(1000000000, 9999999999));
    const rrpPrice = Math.random() > 0.03 ? randInt(150, 5990) : null;
    const stockRoll = Math.random();
    const currentStock = stockRoll < 0.08 ? 0 : stockRoll < 0.2 ? randInt(1, 9) : randInt(10, 800);
    products.push(buildProduct({ brand, name, sku, barcode, rrpPrice, currentStock }));
  }

  // sprinkle promotions/allocations only on the randomly-generated tail, keeping the
  // guaranteed demo items (Grip Sock, Elite X, Elite Pro, ...) predictable for demos.
  const randomTail = products.slice(guaranteed.length);

  // sprinkle promotions on ~22% of products
  randomTail.forEach(p => {
    if (Math.random() < 0.22 && p.rrpPrice) {
      const n = randInt(1, 3);
      const used = new Set();
      for (let k = 0; k < n; k++) {
        let pname = pick(PROMO_NAMES);
        let tries = 0;
        while (used.has(pname) && tries < 5) { pname = pick(PROMO_NAMES); tries++; }
        used.add(pname);
        const discount = randInt(5, 30) / 100;
        const price = Math.max(10, Math.round(p.rrpPrice * (1 - discount)));
        p.promotions.push({ id: genId("promo"), name: pname, price, active: k === 0, createdAt: new Date().toISOString() });
      }
      const enabled = p.promotions.find(pr => pr.active);
      if (enabled) p.activePromotionId = enabled.id;
    }
  });

  // allocate some stock to events on ~15% of products
  randomTail.forEach(p => {
    if (Math.random() < 0.15 && p.currentStock > 5) {
      const numEvents = randInt(1, 2);
      const chosenEvents = [...events].sort(() => Math.random() - 0.5).slice(0, numEvents);
      chosenEvents.forEach(ev => {
        const allocated = Math.min(p.currentStock, randInt(1, Math.max(1, Math.floor(p.currentStock * 0.4))));
        const returned = Math.random() < 0.3 ? randInt(0, allocated) : 0;
        p.eventAllocations.push({ id: genId("ea"), eventId: ev.id, eventName: ev.name, allocated, returned });
      });
    }
  });

  return products;
}

function pad(n, len) { return String(n).padStart(len, "0"); }
function orderDateCode(d) {
  return String(d.getFullYear()).slice(2) + pad(d.getMonth() + 1, 2) + pad(d.getDate(), 2);
}
function nextOrderNumber(existingOrders, forDate) {
  const dateCode = orderDateCode(forDate);
  const seq = existingOrders.filter(o => o.orderNumber.startsWith("EV" + dateCode)).length + 1;
  return `EV${dateCode}-${pad(seq, 4)}`;
}

// Historical demo orders so Dashboard has something meaningful to chart out of the box.
function generateSeedOrders(products, events, salesPeople, paymentMethods, daysBack = 45) {
  const sellable = products.filter(p => p.rrpPrice);
  if (!sellable.length || !events.length || !salesPeople.length) return [];
  const orders = [];
  const seqByDate = {};
  const now = new Date();
  for (let d = daysBack; d >= 0; d--) {
    const day = new Date(now);
    day.setDate(day.getDate() - d);
    const numOrders = d === 0 ? randInt(2, 8) : randInt(3, 14);
    for (let i = 0; i < numOrders; i++) {
      const ev = pick(events);
      const sp = pick(salesPeople);
      const pm = pick(paymentMethods);
      const hour = randInt(9, 20), minute = randInt(0, 59), second = randInt(0, 59);
      const createdAt = new Date(day.getFullYear(), day.getMonth(), day.getDate(), hour, minute, second).toISOString();
      const numItems = randInt(1, 4);
      const items = [];
      const chosen = new Set();
      for (let k = 0; k < numItems; k++) {
        const prod = pick(sellable);
        if (chosen.has(prod.id)) continue;
        chosen.add(prod.id);
        const qty = randInt(1, 3);
        const isGiveaway = Math.random() < 0.06;
        let unitPrice = prod.rrpPrice, priceLabel = "RRP";
        const enabledPromos = (prod.promotions || []).filter(pr => pr.active);
        if (!isGiveaway && enabledPromos.length && Math.random() < 0.35) {
          const promo = pick(enabledPromos);
          unitPrice = promo.price; priceLabel = promo.name;
        }
        if (isGiveaway) unitPrice = 0;
        items.push({ productId: prod.id, name: prod.name, brand: prod.brand, sku: prod.sku, unitPrice, priceLabel, qty, isGiveaway, remark: "" });
      }
      if (!items.length) continue;
      const subtotal = items.reduce((s, it) => s + (it.isGiveaway ? 0 : it.unitPrice * it.qty), 0);
      const discount = Math.random() < 0.08 ? Math.round(subtotal * (randInt(3, 10) / 100)) : 0;
      const total = Math.max(0, subtotal - discount);
      const statusRoll = Math.random();
      const status = statusRoll < 0.04 ? "refunded" : statusRoll < 0.06 ? "cancelled" : "completed";
      const dateCode = orderDateCode(day);
      seqByDate[dateCode] = (seqByDate[dateCode] || 0) + 1;
      orders.push({
        id: genId("ord"),
        orderNumber: `EV${dateCode}-${pad(seqByDate[dateCode], 4)}`,
        eventId: ev.id, eventName: ev.name,
        salesPersonId: sp.id, salesPersonName: sp.name, salesPersonPosition: sp.position,
        paymentMethodId: pm.id, paymentMethod: pm.name,
        customerName: "", customerPhone: "", customerRemark: "",
        items, subtotal, discount, total,
        amountReceived: total, change: 0,
        paymentStatus: status === "completed" ? "Paid" : status === "refunded" ? "Refunded" : "Cancelled",
        status, isDraft: false,
        createdAt,
      });
    }
  }
  return orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
}

/* =========================================================================

function Button({ children, variant = "default", size = "md", className = "", ...props }) {
  const base = "inline-flex items-center justify-center gap-1.5 font-medium rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed";
  const sizes = { sm: "px-2.5 py-1.5 text-xs", md: "px-3.5 py-2 text-sm", lg: "px-4 py-2.5 text-sm" };
  const variants = {
    default: "bg-brand-700 text-white hover:bg-brand-800 focus:ring-brand-300",
    outline: "border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 focus:ring-gray-200",
    ghost: "text-gray-600 hover:bg-gray-100 focus:ring-gray-200",
    danger: "bg-red-600 text-white hover:bg-red-700 focus:ring-red-300",
    subtle: "bg-brand-50 text-brand-800 hover:bg-brand-100 focus:ring-brand-200",
  };
  return <button className={classNames(base, sizes[size], variants[variant], className)} {...props}>{children}</button>;
}
function Badge({ children, color = "gray" }) {
  const colors = {
    gray: "bg-gray-100 text-gray-700",
    green: "bg-green-50 text-green-700 border border-green-200",
    red: "bg-red-50 text-red-700 border border-red-200",
    amber: "bg-amber-50 text-amber-700 border border-amber-200",
    blue: "bg-blue-50 text-blue-700 border border-blue-200",
    brand: "bg-brand-50 text-brand-700 border border-brand-200",
  };
  return <span className={classNames("inline-flex items-center px-2 py-0.5 rounded text-xs font-medium", colors[color])}>{children}</span>;
}
function Modal({ open, onClose, title, children, width = "max-w-2xl", footer }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 fade-in" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>

const inputCls = "w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-300 focus:border-brand-400";

/* =========================================================================
   STOCK MODAL (adjust + history)
   ========================================================================= */
function StockModal({ product, onAdjust, onClose, currentUserName }) {
  const [mode, setMode] = useState("increase");
  const [qty, setQty] = useState("");
  const [remark, setRemark] = useState("");
  const [tab, setTab] = useState("adjust");
  if (!product) return null;

  function apply() {
    const n = Number(qty);
    if (!qty || isNaN(n) || n < 0) return;
    let newStock = product.currentStock;
    let action = "";
    if (mode === "increase") { newStock += n; action = "Increase"; }
    else if (mode === "decrease") { newStock = Math.max(0, newStock - n); action = "Decrease"; }
    else if (mode === "set") { newStock = n; action = "Set"; }
    onAdjust(product.id, { newStock, action, qty: n, remark: remark || "—", user: currentUserName });
    setQty(""); setRemark("");
  }

  return (
    <Modal open={!!product} onClose={onClose} title={`Stock — ${product.name}`} width="max-w-lg">
      <div className="flex gap-1 mb-4 border-b border-gray-200">
        {["adjust", "history"].map(t => (
          <button key={t} onClick={() => setTab(t)} className={classNames("px-3 py-2 text-sm font-medium border-b-2 -mb-px capitalize", tab === t ? "border-brand-700 text-brand-800" : "border-transparent text-gray-500 hover:text-gray-700")}>
            {t === "adjust" ? "Adjust Stock" : `History (${(product.stockHistory || []).length})`}
          </button>
        ))}
      </div>
      {tab === "adjust" ? (
        <div>
          <div className="flex items-center justify-between bg-gray-50 rounded-md px-3 py-2 mb-4 text-sm">
            <span className="text-gray-500">Current stock</span>
            <span className="font-semibold text-gray-900">{product.currentStock}</span>
          </div>
          <div className="grid grid-cols-3 gap-2 mb-3">
            {[["increase", "Increase"], ["decrease", "Decrease"], ["set", "Set / Edit"]].map(([m, label]) => (
              <button key={m} onClick={() => setMode(m)} className={classNames("px-2 py-2 rounded-md text-xs font-medium border", mode === m ? "bg-brand-700 border-brand-700 text-white" : "border-gray-300 text-gray-600 hover:bg-gray-50")}>{label}</button>
            ))}
          </div>
          <Field label={mode === "set" ? "New stock quantity" : "Quantity"}>
            <input type="number" min="0" className={inputCls} value={qty} onChange={e => setQty(e.target.value)} />
          </Field>
          <Field label="Remark">
            <input className={inputCls} value={remark} onChange={e => setRemark(e.target.value)} placeholder="e.g. Supplier delivery, stock count correction…" />
          </Field>
          <div className="flex justify-end gap-2 pt-1">
            <Button variant="outline" onClick={onClose}>Close</Button>
            <Button onClick={apply}>Apply Adjustment</Button>
          </div>
        </div>
      ) : (
        <div className="overflow-y-auto max-h-96">
          <table className="w-full text-xs">
            <thead className="text-gray-500 sticky top-0 bg-white"><tr className="text-left border-b border-gray-200">
              <th className="py-1.5 pr-2">Date</th><th className="py-1.5 pr-2">User</th><th className="py-1.5 pr-2">Action</th><th className="py-1.5 pr-2">Qty</th><th className="py-1.5 pr-2">Result</th><th className="py-1.5">Remark</th>
            </tr></thead>
            <tbody>
              {[...(product.stockHistory || [])].reverse().map(h => (
                <tr key={h.id} className="border-b border-gray-100">
                  <td className="py-1.5 pr-2 whitespace-nowrap text-gray-500">{formatDateTime(h.date)}</td>
                  <td className="py-1.5 pr-2">{h.user}</td>
                  <td className="py-1.5 pr-2"><Badge color={h.action === "Increase" || h.action === "Import" ? "green" : h.action === "Decrease" ? "red" : "blue"}>{h.action}</Badge></td>
                  <td className="py-1.5 pr-2">{h.qty}</td>
                  <td className="py-1.5 pr-2 font-medium">{h.resultingStock}</td>
                  <td className="py-1.5 text-gray-500">{h.remark}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </Modal>
  );
}

/* =========================================================================
   EVENT ALLOCATION MODAL
   ========================================================================= */
function EventModal({ product, events, onAllocate, onReturn, onMove, onClose }) {
  const [action, setAction] = useState("allocate");
  const [eventId, setEventId] = useState(events[0]?.id || "");
  const [toEventId, setToEventId] = useState(events[1]?.id || events[0]?.id || "");
  const [fromAllocId, setFromAllocId] = useState("");
  const [qty, setQty] = useState("");

  // Hooks must run on every render regardless of whether `product` is set yet
  // (the modal is always mounted; `product` toggles null <-> object as it opens/closes).
  useEffect(() => {
    const allocs = product?.eventAllocations || [];
    if (allocs.length && !fromAllocId) setFromAllocId(allocs[0].id);
  }, [product]);

  if (!product) return null;

  const avail = availableStock(product);
  const allocations = product.eventAllocations || [];

  function submit() {
    const n = Number(qty);
    if (!qty || isNaN(n) || n <= 0) return;
    if (action === "allocate") {
      if (n > avail) return;
      const ev = events.find(e => e.id === eventId);
      onAllocate(product.id, { eventId, eventName: ev?.name || "", qty: n });
    } else if (action === "return") {
      const alloc = allocations.find(a => a.id === fromAllocId);
      if (!alloc) return;
      const remaining = alloc.allocated - alloc.returned;
      if (n > remaining) return;
      onReturn(product.id, { allocationId: fromAllocId, qty: n });
    } else if (action === "move") {
      const alloc = allocations.find(a => a.id === fromAllocId);
      if (!alloc) return;
      const remaining = alloc.allocated - alloc.returned;
      if (n > remaining || toEventId === alloc.eventId) return;
      const toEv = events.find(e => e.id === toEventId);
      onMove(product.id, { fromAllocationId: fromAllocId, toEventId, toEventName: toEv?.name || "", qty: n });
    }
    setQty("");
  }

  return (
    <Modal open={!!product} onClose={onClose} title={`Event Stock — ${product.name}`} width="max-w-2xl">
      <div className="grid grid-cols-3 gap-2 mb-4 text-center">
        <div className="bg-gray-50 rounded-md py-2"><div className="text-[11px] text-gray-500">Total Stock</div><div className="font-semibold">{product.currentStock}</div></div>
        <div className="bg-amber-50 rounded-md py-2"><div className="text-[11px] text-amber-700">Allocated to Events</div><div className="font-semibold text-amber-800">{allocatedEventStock(product)}</div></div>
        <div className="bg-green-50 rounded-md py-2"><div className="text-[11px] text-green-700">Available Warehouse</div><div className="font-semibold text-green-800">{avail}</div></div>
      </div>

      <div className="mb-4">
        <div className="text-xs font-medium text-gray-600 mb-1.5">Per-event breakdown</div>
        {allocations.length === 0 ? (
          <p className="text-xs text-gray-400 italic">No allocations yet.</p>
        ) : (
          <table className="w-full text-xs mb-2">
            <thead className="text-gray-500"><tr className="text-left border-b border-gray-200">
              <th className="py-1">Event</th><th className="py-1">Allocated</th><th className="py-1">Returned</th><th className="py-1">Remaining</th>
            </tr></thead>
            <tbody>
              {allocations.map(a => (
                <tr key={a.id} className="border-b border-gray-100">
                  <td className="py-1.5">{a.eventName}</td>
                  <td className="py-1.5">{a.allocated}</td>
                  <td className="py-1.5">{a.returned}</td>
                  <td className="py-1.5 font-medium">{a.allocated - a.returned}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      <div className="border-t border-gray-200 pt-4">
        <div className="grid grid-cols-3 gap-2 mb-3">
          {[["allocate", "Allocate to Event"], ["return", "Return from Event"], ["move", "Move Between Events"]].map(([m, label]) => (
            <button key={m} onClick={() => setAction(m)} disabled={m !== "allocate" && allocations.length === 0}
              className={classNames("px-2 py-2 rounded-md text-xs font-medium border disabled:opacity-40", action === m ? "bg-brand-700 border-brand-700 text-white" : "border-gray-300 text-gray-600 hover:bg-gray-50")}>{label}</button>
          ))}
        </div>

        {action === "allocate" && (
          <div className="grid grid-cols-2 gap-3">
            <Field label="Event"><select className={inputCls} value={eventId} onChange={e => setEventId(e.target.value)}>{events.map(ev => <option key={ev.id} value={ev.id}>{ev.name}</option>)}</select></Field>
            <Field label={`Quantity (max ${avail})`}><input type="number" min="1" max={avail} className={inputCls} value={qty} onChange={e => setQty(e.target.value)} /></Field>
          </div>
        )}
        {action === "return" && allocations.length > 0 && (
          <div className="grid grid-cols-2 gap-3">
            <Field label="From allocation"><select className={inputCls} value={fromAllocId} onChange={e => setFromAllocId(e.target.value)}>{allocations.map(a => <option key={a.id} value={a.id}>{a.eventName} (remaining {a.allocated - a.returned})</option>)}</select></Field>
            <Field label="Quantity"><input type="number" min="1" className={inputCls} value={qty} onChange={e => setQty(e.target.value)} /></Field>
          </div>
        )}
        {action === "move" && allocations.length > 0 && (
          <div className="grid grid-cols-3 gap-3">
            <Field label="From"><select className={inputCls} value={fromAllocId} onChange={e => setFromAllocId(e.target.value)}>{allocations.map(a => <option key={a.id} value={a.id}>{a.eventName} (remaining {a.allocated - a.returned})</option>)}</select></Field>
            <Field label="To event"><select className={inputCls} value={toEventId} onChange={e => setToEventId(e.target.value)}>{events.map(ev => <option key={ev.id} value={ev.id}>{ev.name}</option>)}</select></Field>
            <Field label="Quantity"><input type="number" min="1" className={inputCls} value={qty} onChange={e => setQty(e.target.value)} /></Field>
          </div>
        )}
        <div className="flex justify-end gap-2 pt-2">
          <Button variant="outline" onClick={onClose}>Close</Button>
          <Button onClick={submit}>Apply</Button>
        </div>
      </div>
    </Modal>
  );
}

/* =========================================================================
   PROMOTION MODAL
   ========================================================================= */
function PromotionModal({ product, onAdd, onUpdate, onDelete, onSetActive, onClose }) {
  const [name, setName] = useState("");
  const [price, setPrice] = useState("");
  const [editingId, setEditingId] = useState(null);
  if (!product) return null;
  const promos = product.promotions || [];

  function submit() {
    if (!name.trim() || !price) return;
    if (editingId) { onUpdate(product.id, editingId, { name: name.trim(), price: Number(price) }); setEditingId(null); }
    else { onAdd(product.id, { name: name.trim(), price: Number(price) }); }
    setName(""); setPrice("");
  }
  function startEdit(p) { setEditingId(p.id); setName(p.name); setPrice(String(p.price)); }

  return (
    <Modal open={!!product} onClose={onClose} title={`Promotions — ${product.name}`} width="max-w-2xl">
      <div className="mb-4 text-xs text-gray-500">RRP: <span className="font-medium text-gray-800">{formatCurrency(product.rrpPrice)}</span> &middot; Unlimited promotions supported. Only one may be active in POS at a time.</div>

      <div className="border border-gray-200 rounded-md divide-y divide-gray-100 mb-4 max-h-64 overflow-y-auto">
        {promos.length === 0 && <div className="p-4 text-xs text-gray-400 italic text-center">No promotions yet.</div>}
        {promos.map(p => (
          <div key={p.id} className="flex items-center justify-between px-3 py-2.5">
            <div className="flex items-center gap-2">
              <button title="Set active in POS" disabled={!p.active} onClick={() => onSetActive(product.id, product.activePromotionId === p.id ? null : p.id)}
                className={classNames("w-4 h-4 rounded-full border flex items-center justify-center", product.activePromotionId === p.id && p.active ? "bg-brand-700 border-brand-700" : "border-gray-300")}>
                {product.activePromotionId === p.id && p.active && <span className="w-1.5 h-1.5 rounded-full bg-white" />}
              </button>
              <div>
                <div className="text-sm font-medium text-gray-900">{p.name}</div>
                <div className="text-xs text-gray-500">{formatCurrency(p.price)} {product.activePromotionId === p.id && p.active && <span className="text-brand-700 font-medium ml-1">&middot; Active in POS</span>}</div>
              </div>
              <Badge color={p.active ? "green" : "gray"}>{p.active ? "Enabled" : "Disabled"}</Badge>
            </div>
            <div className="flex items-center gap-1">
              <button onClick={() => onUpdate(product.id, p.id, { active: !p.active })} className="text-xs px-2 py-1 rounded border border-gray-200 hover:bg-gray-50 text-gray-600">{p.active ? "Disable" : "Enable"}</button>
              <button onClick={() => startEdit(p)} className="p-1.5 rounded hover:bg-gray-100 text-gray-500"><Icon name="edit" className="w-3.5 h-3.5" /></button>
              <button onClick={() => onDelete(product.id, p.id)} className="p-1.5 rounded hover:bg-red-50 text-red-500"><Icon name="trash" className="w-3.5 h-3.5" /></button>
            </div>
          </div>
        ))}
      </div>

      <div className="bg-gray-50 rounded-md p-3">
        <div className="text-xs font-medium text-gray-600 mb-2">{editingId ? "Edit promotion" : "Add promotion"}</div>
        <div className="grid grid-cols-[1fr_140px_auto] gap-2 items-end">
          <Field label="Promotion Name"><input className={inputCls} value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Summer Sale" /></Field>
          <Field label="Price (THB)"><input type="number" min="0" className={inputCls} value={price} onChange={e => setPrice(e.target.value)} /></Field>
          <Button onClick={submit} className="mb-3">{editingId ? "Save" : "Add"}</Button>
        </div>
        {editingId && <button className="text-xs text-gray-400 hover:text-gray-600" onClick={() => { setEditingId(null); setName(""); setPrice(""); }}>Cancel edit</button>}
      </div>
      <div className="flex justify-end pt-3"><Button variant="outline" onClick={onClose}>Close</Button></div>
    </Modal>
  );
}

/* =========================================================================
   IMPORT MODAL (smart header mapping)
   ========================================================================= */
function ImportModal({ open, onClose, onImport }) {
  const [step, setStep] = useState("upload"); // upload | mapping | result
  const [fileName, setFileName] = useState("");
  const [headers, setHeaders] = useState([]);
  const [rows, setRows] = useState([]);
  const [mapping, setMapping] = useState({}); // header -> field
  const [promoNames, setPromoNames] = useState({}); // header -> promotion name (for field === "promo")
  const [result, setResult] = useState(null);
  const [parsing, setParsing] = useState(false);
  const [headerRowInfo, setHeaderRowInfo] = useState(0);
  const fileRef = useRef(null);

  function reset() { setStep("upload"); setFileName(""); setHeaders([]); setRows([]); setMapping({}); setPromoNames({}); setResult(null); setHeaderRowInfo(0); }
  function handleClose() { reset(); onClose(); }

  function handleFile(file) {
    if (!file) return;
    setParsing(true);
    setFileName(file.name);
    const ext = file.name.split(".").pop().toLowerCase();
    if (ext === "csv") {
      // Parse as raw rows (no assumed header row) so we can auto-detect where
      // the real header is — many exported reports have a title/letterhead
      // block above the actual column headers.
      Papa.parse(file, {
        header: false, skipEmptyLines: false,
        complete: (res) => {
          const { headers, rows: dataRows, headerRowIdx } = rowsToObjects(res.data);
          finishParse(headers, dataRows, headerRowIdx);
        },
        error: () => setParsing(false),
      });
    } else {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type: "array" });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", raw: true });
          const { headers, rows: dataRows, headerRowIdx } = rowsToObjects(raw);
          finishParse(headers, dataRows, headerRowIdx);
        } catch (err) { setParsing(false); }
      };
      reader.readAsArrayBuffer(file);
    }
  }
  function finishParse(hdrs, data, headerRowIdx) {
    const guessed = autoMapHeaders(hdrs);
    const m = {};
    const pn = {};
    guessed.forEach(g => {
      m[g.header] = g.field;
      if (g.field === "promo") pn[g.header] = detectPromotionHeader(g.header) || g.header;
    });
    setHeaders(hdrs);
    setRows(data);
    setMapping(m);
    setPromoNames(pn);
    setHeaderRowInfo(headerRowIdx);
    setParsing(false);
    setStep("mapping");
  }

  function doImport() {
    let imported = 0, skipped = 0;
    const newProducts = [];
    rows.forEach(row => {
      const rec = { brand: "", name: "", barcode: "", sku: "", rrpPrice: null, currentStock: 0 };
      const promosToCreate = [];
      Object.entries(mapping).forEach(([header, field]) => {
        if (!field) return;
        const val = row[header];
        if (field === "rrpPrice") rec.rrpPrice = parseNumberLoose(val);
        else if (field === "currentStock") rec.currentStock = parseNumberLoose(val) ?? 0;
        else if (field === "promo") {
          const price = parseNumberLoose(val);
          if (price > 0) promosToCreate.push({ name: (promoNames[header] || header).trim(), price });
        }
        else rec[field] = val !== undefined && val !== null ? String(val).trim() : "";
      });
      if (!rec.name || !rec.name.trim()) { skipped++; return; }
      const product = buildProduct(rec);
      if (promosToCreate.length) {
        product.promotions = promosToCreate.map(pr => ({ id: genId("promo"), name: pr.name, price: pr.price, active: true, createdAt: new Date().toISOString() }));
        // Multiple promotions may apply to the same row — leave activePromotionId
        // unset so the user consciously picks which one goes live in POS.
      }
      newProducts.push(product);
      imported++;
    });
    onImport(newProducts);
    setResult({ imported, skipped, total: rows.length, promosCreated: newProducts.reduce((s, p) => s + (p.promotions?.length || 0), 0) });
    setStep("result");
  }

  const mappedFieldsUsed = Object.values(mapping).filter(Boolean);
  const nameIsMapped = mappedFieldsUsed.includes("name");

  return (
    <Modal open={open} onClose={handleClose} title="Smart Import — Excel / CSV" width="max-w-3xl"
      footer={step === "mapping" ? (<>
        <Button variant="outline" onClick={() => setStep("upload")}>Back</Button>
        <Button onClick={doImport} disabled={!nameIsMapped}>Import {rows.length} Rows</Button>
      </>) : step === "result" ? (<Button onClick={handleClose}>Done</Button>) : null}>

      {step === "upload" && (
        <div>
          <div className="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center hover:border-brand-400 transition-colors cursor-pointer"
            onClick={() => fileRef.current?.click()}
            onDragOver={e => e.preventDefault()}
            onDrop={e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}>
            <Icon name="upload" className="w-8 h-8 mx-auto text-gray-400 mb-2" />
            <p className="text-sm text-gray-600 font-medium">{parsing ? "Parsing file…" : "Click to upload or drag & drop"}</p>
            <p className="text-xs text-gray-400 mt-1">.xlsx, .xls, or .csv — from any supplier, any column layout</p>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={e => handleFile(e.target.files[0])} />
          </div>
          <div className="mt-4 bg-blue-50 border border-blue-100 rounded-md p-3 text-xs text-blue-800 flex gap-2">
            <Icon name="info" className="w-4 h-4 shrink-0 mt-0.5" />
            <span>No fixed template required. We automatically detect columns like "Vendor", "EAN", "MSRP", or "On Hand" and map them to the right fields. Only <strong>Product Name</strong> is required — everything else is optional and reviewable before import. Columns named "Promotion &lt;name&gt;" (e.g. "Promotion Trade In", "Promotion Galaxy") are detected automatically — one column per promotion, price per row.</span>
          </div>
        </div>
      )}

      {step === "mapping" && (
        <div>
          <p className="text-xs text-gray-500 mb-1">File: <span className="font-medium text-gray-700">{fileName}</span> &middot; {rows.length} data row{rows.length !== 1 ? "s" : ""} detected. Review the suggested mapping below — unmatched columns are ignored automatically.</p>
          {headerRowInfo > 0 && (
            <p className="text-xs text-blue-700 bg-blue-50 border border-blue-100 rounded-md px-2.5 py-1.5 mb-3 flex items-center gap-1.5">
              <Icon name="info" className="w-3.5 h-3.5 shrink-0" />
              Detected column headers on row {headerRowInfo + 1} of the sheet — the {headerRowInfo} row{headerRowInfo !== 1 ? "s" : ""} above it (title, company info, etc.) were skipped automatically.
            </p>
          )}
          <table className="w-full text-xs border border-gray-200 rounded-md overflow-hidden">
            <thead className="bg-gray-50 text-gray-500"><tr className="text-left">
              <th className="px-3 py-2">Source Column</th><th className="px-3 py-2">Sample Value</th><th className="px-3 py-2">Maps To</th>
            </tr></thead>
            <tbody>
              {headers.map(h => (
                <tr key={h} className="border-t border-gray-100">
                  <td className="px-3 py-2 font-medium text-gray-800">{h}</td>
                  <td className="px-3 py-2 text-gray-500">{String(rows[0]?.[h] ?? "").slice(0, 30) || "—"}</td>
                  <td className="px-3 py-2">
                    <select className="text-xs border border-gray-300 rounded px-2 py-1 w-full" value={mapping[h] || ""} onChange={e => {
                      const field = e.target.value || null;
                      setMapping(m => ({ ...m, [h]: field }));
                      if (field === "promo" && !promoNames[h]) setPromoNames(pn => ({ ...pn, [h]: detectPromotionHeader(h) || h }));
                    }}>
                      <option value="">Ignore column</option>
                      {Object.entries(FIELD_LABELS).map(([k, label]) => <option key={k} value={k}>{label}</option>)}
                    </select>
                    {mapping[h] === "promo" && (
                      <input type="text" value={promoNames[h] || ""} onChange={e => setPromoNames(pn => ({ ...pn, [h]: e.target.value }))}
                        placeholder="Promotion name" className="mt-1 text-xs border border-gray-300 rounded px-2 py-1 w-full" />
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {!nameIsMapped && <p className="text-xs text-red-600 mt-3">Map at least one column to "Product Name" to continue.</p>}
        </div>
      )}

      {step === "result" && result && (
        <div className="text-center py-6">
          <Icon name="check" className="w-10 h-10 mx-auto text-green-500 mb-3" />
          <p className="text-sm text-gray-700">Imported <strong>{result.imported}</strong> of {result.total} rows.</p>
          {result.promosCreated > 0 && <p className="text-xs text-green-700 mt-1">{result.promosCreated} promotion(s) created from Promotion columns — set which one is active in POS from each product's Promotions menu.</p>}
          {result.skipped > 0 && <p className="text-xs text-amber-600 mt-1">{result.skipped} row(s) skipped — missing product name.</p>}
        </div>
      )}
    </Modal>
  );
}

/* =========================================================================
   MAIN INVENTORY APP
   ========================================================================= */
const FILTERS = [
  { key: "all", label: "All Products" },
  { key: "inStock", label: "In Stock" },
  { key: "outOfStock", label: "Out of Stock" },
  { key: "lowStock", label: "Low Stock" },
  { key: "withPromo", label: "With Promotion" },
  { key: "withoutPromo", label: "Without Promotion" },
  { key: "allocated", label: "Allocated to Event" },
  { key: "notAllocated", label: "Not Allocated" },
];

function InventoryView({ currentUser, products, setProducts, events }) {
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [sortBy, setSortBy] = useState("name");
  const [sortDir, setSortDir] = useState("asc");
  const [page, setPage] = useState(1);
  const [pageSize, setPageSize] = useState(50);
  const [selected, setSelected] = useState(() => new Set());

  const [editingProduct, setEditingProduct] = useState(null); // null = closed, {} = new, obj = edit
  const [showAddEdit, setShowAddEdit] = useState(false);
  // Modals reference products by id (not a snapshot object) so they always show
  // live data — e.g. adding a promotion or allocating stock updates the open modal instantly.
  const [stockProductId, setStockProductId] = useState(null);
  const [eventProductId, setEventProductId] = useState(null);
  const [promoProductId, setPromoProductId] = useState(null);
  const stockProduct = useMemo(() => products.find(p => p.id === stockProductId) || null, [products, stockProductId]);
  const eventProduct = useMemo(() => products.find(p => p.id === eventProductId) || null, [products, eventProductId]);
  const promoProduct = useMemo(() => products.find(p => p.id === promoProductId) || null, [products, promoProductId]);
  const [showImport, setShowImport] = useState(false);
  const [showExport, setShowExport] = useState(false);
  const [confirm, setConfirm] = useState(null);
  const [toasts, setToasts] = useState([]);

  function pushToast(message) {
    const id = genId("t");
    setToasts(t => [...t, { id, message }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2600);
  }

  /* ---------- derived data ---------- */
  const filteredSorted = useMemo(() => {
    const q = search.trim().toLowerCase();
    let list = products;
    if (q) {
      list = list.filter(p =>
        (p.name || "").toLowerCase().includes(q) ||
        (p.brand || "").toLowerCase().includes(q) ||
        (p.barcode || "").toLowerCase().includes(q) ||
        (p.sku || "").toLowerCase().includes(q)
      );
    }
    switch (filter) {
      case "inStock": list = list.filter(p => p.currentStock > 10); break;
      case "outOfStock": list = list.filter(p => p.currentStock === 0); break;
      case "lowStock": list = list.filter(p => p.currentStock > 0 && p.currentStock <= 10); break;
      case "withPromo": list = list.filter(p => !!activePromotion(p)); break;
      case "withoutPromo": list = list.filter(p => !activePromotion(p)); break;
      case "allocated": list = list.filter(p => allocatedEventStock(p) > 0); break;
      case "notAllocated": list = list.filter(p => allocatedEventStock(p) === 0); break;
      default: break;
    }
    const sorted = [...list].sort((a, b) => {
      let av, bv;
      if (sortBy === "rrpPrice") { av = a.rrpPrice ?? -1; bv = b.rrpPrice ?? -1; }
      else if (sortBy === "currentStock") { av = a.currentStock; bv = b.currentStock; }
      else { av = (a[sortBy] || "").toString().toLowerCase(); bv = (b[sortBy] || "").toString().toLowerCase(); }
      if (av < bv) return sortDir === "asc" ? -1 : 1;
      if (av > bv) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
    return sorted;
  }, [products, search, filter, sortBy, sortDir]);

  const totalPages = Math.max(1, Math.ceil(filteredSorted.length / pageSize));
  const pageClamped = Math.min(page, totalPages);
  const paged = useMemo(() => filteredSorted.slice((pageClamped - 1) * pageSize, pageClamped * pageSize), [filteredSorted, pageClamped, pageSize]);

  useEffect(() => { setPage(1); }, [search, filter, pageSize]);

  const stats = useMemo(() => ({
    total: products.length,
    outOfStock: products.filter(p => p.currentStock === 0).length,
    lowStock: products.filter(p => p.currentStock > 0 && p.currentStock <= 10).length,
    withPromo: products.filter(p => !!activePromotion(p)).length,
    availableTotal: products.reduce((s, p) => s + Math.max(0, availableStock(p)), 0),
  }), [products]);

  /* ---------- mutations ---------- */
  function updateProduct(id, patch) { setProducts(ps => ps.map(p => p.id === id ? { ...p, ...patch } : p)); }

  function saveProduct(data) {
    if (editingProduct && editingProduct.id) {
      updateProduct(editingProduct.id, data);
      pushToast("Product updated");
    } else {
      const np = buildProduct(data);
      np.stockHistory = [{ id: genId("h"), date: new Date().toISOString(), user: currentUser.name, action: "Set", qty: data.currentStock || 0, remark: "Product created", resultingStock: data.currentStock || 0 }];
      setProducts(ps => [np, ...ps]);
      pushToast("Product created");
    }
    setShowAddEdit(false); setEditingProduct(null);
  }
  function duplicateProduct(p) {
    const copy = { ...p, id: genId("p"), name: p.name + " (Copy)", sku: p.sku ? p.sku + "-COPY" : "", barcode: "", createdAt: new Date().toISOString(), stockHistory: [{ id: genId("h"), date: new Date().toISOString(), user: currentUser.name, action: "Set", qty: p.currentStock, remark: "Duplicated from " + p.name, resultingStock: p.currentStock }] };
    setProducts(ps => [copy, ...ps]);
    pushToast("Product duplicated");
  }
  function deleteProduct(id) {
    setProducts(ps => ps.filter(p => p.id !== id));
    setSelected(s => { const n = new Set(s); n.delete(id); return n; });
    pushToast("Product deleted");
  }
  function bulkDelete() {
    setProducts(ps => ps.filter(p => !selected.has(p.id)));
    pushToast(`${selected.size} products deleted`);
    setSelected(new Set());
  }
  function deleteAll() {
    setProducts([]);
    setSelected(new Set());
    pushToast("Entire inventory deleted");
  }
  function adjustStock(id, { newStock, action, qty, remark, user }) {
    setProducts(ps => ps.map(p => {
      if (p.id !== id) return p;
      const hist = [...(p.stockHistory || []), { id: genId("h"), date: new Date().toISOString(), user, action, qty, remark, resultingStock: newStock }];
      return { ...p, currentStock: newStock, stockHistory: hist };
    }));
    pushToast("Stock updated");
  }
  function allocateToEvent(id, { eventId, eventName, qty }) {
    setProducts(ps => ps.map(p => {
      if (p.id !== id) return p;
      const existing = (p.eventAllocations || []).find(a => a.eventId === eventId);
      let allocations;
      if (existing) allocations = p.eventAllocations.map(a => a.id === existing.id ? { ...a, allocated: a.allocated + qty } : a);
      else allocations = [...(p.eventAllocations || []), { id: genId("ea"), eventId, eventName, allocated: qty, returned: 0 }];
      return { ...p, eventAllocations: allocations };
    }));
    pushToast("Stock allocated to event");
  }
  function returnFromEvent(id, { allocationId, qty }) {
    setProducts(ps => ps.map(p => {
      if (p.id !== id) return p;
      const allocations = (p.eventAllocations || []).map(a => a.id === allocationId ? { ...a, returned: a.returned + qty } : a);
      return { ...p, eventAllocations: allocations };
    }));
    pushToast("Stock returned from event");
  }
  function moveBetweenEvents(id, { fromAllocationId, toEventId, toEventName, qty }) {
    setProducts(ps => ps.map(p => {
      if (p.id !== id) return p;
      let allocations = p.eventAllocations.map(a => a.id === fromAllocationId ? { ...a, returned: a.returned + qty } : a);
      const existingTo = allocations.find(a => a.eventId === toEventId);
      if (existingTo) allocations = allocations.map(a => a.id === existingTo.id ? { ...a, allocated: a.allocated + qty } : a);
      else allocations = [...allocations, { id: genId("ea"), eventId: toEventId, eventName: toEventName, allocated: qty, returned: 0 }];
      return { ...p, eventAllocations: allocations };
    }));
    pushToast("Stock moved between events");
  }
  function addPromotion(id, { name, price }) {
    setProducts(ps => ps.map(p => p.id === id ? { ...p, promotions: [...p.promotions, { id: genId("promo"), name, price, active: true, createdAt: new Date().toISOString() }] } : p));
    pushToast("Promotion added");
  }
  function updatePromotion(id, promoId, patch) {
    setProducts(ps => ps.map(p => p.id === id ? { ...p, promotions: p.promotions.map(pr => pr.id === promoId ? { ...pr, ...patch } : pr) } : p));
  }
  function deletePromotion(id, promoId) {
    setProducts(ps => ps.map(p => p.id === id ? { ...p, promotions: p.promotions.filter(pr => pr.id !== promoId), activePromotionId: p.activePromotionId === promoId ? null : p.activePromotionId } : p));
    pushToast("Promotion deleted");
  }
  function setActivePromotion(id, promoId) {
    setProducts(ps => ps.map(p => p.id === id ? { ...p, activePromotionId: promoId } : p));
  }
  function importProducts(newProducts) {
    setProducts(ps => [...newProducts, ...ps]);
    pushToast(`Imported ${newProducts.length} products`);
  }

  /* ---------- export ---------- */
  function buildExportRows(list) {
    return list.map(p => ({
      Brand: p.brand || "", "Product Name": p.name, Barcode: p.barcode || "", "Product Code": p.sku || "",
      "RRP Price": p.rrpPrice ?? "", "Promotion Price": activePromotion(p)?.price ?? "",
      "Current Stock": p.currentStock, "Allocated Event Stock": allocatedEventStock(p), "Available Stock": availableStock(p),
    }));
  }
  function doExport(format, scope) {
    let list;
    if (scope === "current") list = paged;
    else if (scope === "filtered") list = filteredSorted;
    else if (scope === "selected") list = products.filter(p => selected.has(p.id));
    else list = products;
    const rows = buildExportRows(list);
    const stamp = new Date().toISOString().slice(0, 10);
    if (format === "csv") {
      const csv = Papa.unparse(rows);
      const blob = new Blob([csv], { type: "text/csv" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `inventory-${stamp}.csv`; a.click();
    } else if (format === "xlsx") {
      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Inventory");
      XLSX.writeFile(wb, `inventory-${stamp}.xlsx`);
    } else if (format === "pdf") {
      const doc = new window.jspdf.jsPDF({ orientation: "landscape" });
      const head = rows.length ? [Object.keys(rows[0])] : [[]];
      const body = rows.map(r => Object.values(r));
      doc.autoTable({ head, body, styles: { fontSize: 7 }, headStyles: { fillColor: [34, 112, 88] } });
      doc.save(`inventory-${stamp}.pdf`);
    }
    pushToast(`Exported ${rows.length} products (${format.toUpperCase()})`);
    setShowExport(false);
  }

  /* ---------- selection helpers ---------- */
  function toggleSelect(id) { setSelected(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; }); }
  function togglePageSelectAll() {
    const pageIds = paged.map(p => p.id);
    const allSelected = pageIds.every(id => selected.has(id));
    setSelected(s => {
      const n = new Set(s);
      if (allSelected) pageIds.forEach(id => n.delete(id));
      else pageIds.forEach(id => n.add(id));
      return n;
    });
  }
  function sortToggle(key) {
    if (sortBy === key) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortBy(key); setSortDir("asc"); }
  }

  const pageAllSelected = paged.length > 0 && paged.every(p => selected.has(p.id));

  return (
    <div>
      <div className="px-6 py-5 max-w-[1600px] mx-auto">
        {/* stats */}
        <div className="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-5">
          {[
            ["Total Products", stats.total, "gray"],
            ["Available Stock (units)", stats.availableTotal.toLocaleString(), "brand"],
            ["Low Stock", stats.lowStock, "amber"],
            ["Out of Stock", stats.outOfStock, "red"],
            ["With Active Promotion", stats.withPromo, "green"],
          ].map(([label, val, color]) => (
            <div key={label} className="bg-white border border-gray-200 rounded-lg p-3.5">
              <div className="text-[11px] text-gray-500 mb-1">{label}</div>
              <div className="text-lg font-semibold text-gray-900">{val}</div>
            </div>
          ))}
        </div>

        {/* toolbar */}
        <div className="bg-white border border-gray-200 rounded-lg p-3 mb-3">
          <div className="flex flex-wrap items-center gap-2">
            <div className="relative flex-1 min-w-[220px]">
              <Icon name="search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
              <input className="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-300 focus:border-brand-400"
                placeholder="Search by name, brand, barcode, or SKU…" value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <select className="text-sm border border-gray-300 rounded-md px-2.5 py-2" value={filter} onChange={e => setFilter(e.target.value)}>
              {FILTERS.map(f => <option key={f.key} value={f.key}>{f.label}</option>)}
            </select>
            <Button variant="outline" size="md" onClick={() => setShowImport(true)}><Icon name="upload" className="w-4 h-4" />Import</Button>
            <Button variant="outline" size="md" onClick={() => setShowExport(true)}><Icon name="download" className="w-4 h-4" />Export</Button>
            {selected.size > 0 && (
              <Button variant="danger" size="md" onClick={() => setConfirm({ type: "bulk" })}><Icon name="trash" className="w-4 h-4" />Delete Selected ({selected.size})</Button>
            )}
            <Button size="md" onClick={() => { setEditingProduct(null); setShowAddEdit(true); }}><Icon name="plus" className="w-4 h-4" />Add Product</Button>
          </div>
          <div className="flex items-center justify-between mt-2 text-[11px] text-gray-400">
            <span>{filteredSorted.length.toLocaleString()} of {products.length.toLocaleString()} products match</span>
            <button onClick={() => setConfirm({ type: "all" })} className="text-red-500 hover:text-red-700 hover:underline">Delete Entire Inventory</button>
          </div>
        </div>

        {/* table */}
        <div className="bg-white border border-gray-200 rounded-lg overflow-hidden">
          <div className="overflow-x-auto table-scroll">
            <table className="w-full text-sm">
              <thead>
                <tr className="bg-gray-50 border-b border-gray-200 text-left text-[11px] uppercase tracking-wide text-gray-500">
                  <th className="px-3 py-2.5 w-8"><input type="checkbox" checked={pageAllSelected} onChange={togglePageSelectAll} /></th>
                  {COLUMNS.map(c => (
                    <th key={c.key} className={classNames("px-3 py-2.5 whitespace-nowrap", c.sortable && "cursor-pointer select-none hover:text-gray-700")}
                      onClick={() => c.sortable && sortToggle(c.key)}>
                      <span className="inline-flex items-center gap-1">{c.label}{c.sortable && sortBy === c.key && <Icon name={sortDir === "asc" ? "arrowUp" : "arrowDown"} className="w-3 h-3" />}</span>
                    </th>
                  ))}
                  <th className="px-3 py-2.5 text-right w-10">Actions</th>
                </tr>
              </thead>
              <tbody>
                {paged.map(p => {
                  const promo = activePromotion(p);
                  return (
                    <tr key={p.id} className="border-b border-gray-100 hover:bg-gray-50">
                      <td className="px-3 py-2"><input type="checkbox" checked={selected.has(p.id)} onChange={() => toggleSelect(p.id)} /></td>
                      <td className="px-3 py-2 text-gray-600 whitespace-nowrap">{p.brand || "—"}</td>
                      <td className="px-3 py-2 font-medium text-gray-900 whitespace-nowrap">
                        {p.name}
                        <div className="mt-0.5"><StockBadge product={p} /></div>
                      </td>
                      <td className="px-3 py-2 text-gray-500 font-mono text-xs whitespace-nowrap">{p.barcode || "—"}</td>
                      <td className="px-3 py-2 text-gray-500 font-mono text-xs whitespace-nowrap">{p.sku || "—"}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{formatCurrency(p.rrpPrice)}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{promo ? <span className="text-brand-700 font-medium">{formatCurrency(promo.price)} <span className="text-gray-400 font-normal">({promo.name})</span></span> : "—"}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{p.currentStock}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{allocatedEventStock(p)}</td>
                      <td className="px-3 py-2 whitespace-nowrap font-medium">{availableStock(p)}</td>
                      <td className="px-3 py-2 text-right">
                        <RowMenu product={p}
                          onEdit={() => { setEditingProduct(p); setShowAddEdit(true); }}
                          onDuplicate={() => duplicateProduct(p)}
                          onDelete={() => setConfirm({ type: "single", id: p.id, name: p.name })}
                          onStock={() => setStockProductId(p.id)}
                          onEvent={() => setEventProductId(p.id)}
                          onPromo={() => setPromoProductId(p.id)} />
                      </td>
                    </tr>
                  );
                })}
                {paged.length === 0 && (
                  <tr><td colSpan={11} className="px-3 py-16 text-center text-gray-400 text-sm">No products match your search or filters.</td></tr>
                )}
              </tbody>
            </table>
          </div>
          {/* pagination */}
          <div className="flex items-center justify-between px-3 py-2.5 border-t border-gray-200 text-xs text-gray-500">
            <div className="flex items-center gap-2">
              <span>Rows per page</span>
              <select className="border border-gray-300 rounded px-1.5 py-1" value={pageSize} onChange={e => setPageSize(Number(e.target.value))}>
                {[25, 50, 100, 200].map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
            <div className="flex items-center gap-2">
              <span>Page {pageClamped} of {totalPages}</span>
              <button disabled={pageClamped <= 1} onClick={() => setPage(p => Math.max(1, p - 1))} className="px-2 py-1 border border-gray-300 rounded disabled:opacity-40">Prev</button>
              <button disabled={pageClamped >= totalPages} onClick={() => setPage(p => Math.min(totalPages, p + 1))} className="px-2 py-1 border border-gray-300 rounded disabled:opacity-40">Next</button>
            </div>
          </div>
        </div>
      </div>

      {/* modals */}
      <Modal open={showAddEdit} onClose={() => { setShowAddEdit(false); setEditingProduct(null); }} title={editingProduct && editingProduct.id ? "Edit Product" : "Add Product"} width="max-w-xl">
        <ProductForm initial={editingProduct} onSave={saveProduct} onCancel={() => { setShowAddEdit(false); setEditingProduct(null); }} />
      </Modal>
      <StockModal product={stockProduct} onAdjust={adjustStock} onClose={() => setStockProductId(null)} currentUserName={currentUser.name} />
      <EventModal product={eventProduct} events={events} onAllocate={allocateToEvent} onReturn={returnFromEvent} onMove={moveBetweenEvents} onClose={() => setEventProductId(null)} />
      <PromotionModal product={promoProduct} onAdd={addPromotion} onUpdate={updatePromotion} onDelete={deletePromotion} onSetActive={setActivePromotion} onClose={() => setPromoProductId(null)} />
      <ImportModal open={showImport} onClose={() => setShowImport(false)} onImport={importProducts} />
      <ExportModal open={showExport} onClose={() => setShowExport(false)}
        counts={{ current: paged.length, filtered: filteredSorted.length, selected: selected.size, all: products.length }}
        onExport={doExport} />

      <ConfirmDialog
        open={!!confirm}
        title={confirm?.type === "all" ? "Delete Entire Inventory" : confirm?.type === "bulk" ? "Delete Selected Products" : "Delete Product"}
        danger
        confirmLabel="Delete"
        message={
          confirm?.type === "all" ? `This will permanently delete all ${products.length.toLocaleString()} products in your inventory. This cannot be undone.`
          : confirm?.type === "bulk" ? `This will permanently delete ${selected.size} selected products. This cannot be undone.`
          : `This will permanently delete "${confirm?.name}". This cannot be undone.`
        }
        requireText={confirm?.type === "all" ? "DELETE" : undefined}
        onCancel={() => setConfirm(null)}
        onConfirm={() => {
          if (confirm.type === "all") deleteAll();
          else if (confirm.type === "bulk") bulkDelete();
          else deleteProduct(confirm.id);
          setConfirm(null);
        }}
      />

      <Toast toasts={toasts} />
    </div>
  );
}

/* =========================================================================
   ORDER HELPERS (shared by POS + Dashboard)
   ========================================================================= */
function isCountableOrder(o) { return !o.isDraft && o.status === "completed"; }
function orderUnits(o, includeGiveaway = true) {
  return (o.items || []).reduce((s, it) => s + (includeGiveaway || !it.isGiveaway ? it.qty : 0), 0);
}
function applyOrderStockDeduction(setProducts, items, meta) {
  setProducts(ps => ps.map(p => {
    const it = items.find(i => i.productId === p.id);
    if (!it) return p;
    const newStock = Math.max(0, p.currentStock - it.qty);
    const hist = [...(p.stockHistory || []), { id: genId("h"), date: new Date().toISOString(), user: meta.user, action: it.isGiveaway ? "Giveaway" : "Sale", qty: it.qty, remark: `Order ${meta.orderNumber} — ${meta.eventName}`, resultingStock: newStock }];
    return { ...p, currentStock: newStock, stockHistory: hist };
  }));
}
function applyOrderStockRestock(setProducts, items, meta) {
  setProducts(ps => ps.map(p => {
    const it = items.find(i => i.productId === p.id);
    if (!it) return p;
    const newStock = p.currentStock + it.qty;
    const hist = [...(p.stockHistory || []), { id: genId("h"), date: new Date().toISOString(), user: meta.user, action: "Refund", qty: it.qty, remark: `Refund of order ${meta.orderNumber}`, resultingStock: newStock }];
    return { ...p, currentStock: newStock, stockHistory: hist };
  }));
}
// When an already-completed order is edited (quantities changed / lines removed),
// reconcile inventory to match the new line items in one pass: products that now
// have MORE units sold get additional stock deducted, products with FEWER units
// sold (or removed entirely) get the difference returned.
function reconcileOrderItemStock(setProducts, oldItems, newItems, meta) {
  const deltaMap = {};
  (oldItems || []).forEach(it => { if (it.productId) deltaMap[it.productId] = (deltaMap[it.productId] || 0) - it.qty; });
  (newItems || []).forEach(it => { if (it.productId) deltaMap[it.productId] = (deltaMap[it.productId] || 0) + it.qty; });
  setProducts(ps => ps.map(p => {
    const delta = deltaMap[p.id];
    if (!delta) return p;
    const newStock = Math.max(0, p.currentStock - delta);
    const hist = [...(p.stockHistory || []), { id: genId("h"), date: new Date().toISOString(), user: meta.user, action: delta > 0 ? "Sale" : "Refund", qty: Math.abs(delta), remark: `Order ${meta.orderNumber} edited`, resultingStock: newStock }];
    return { ...p, currentStock: newStock, stockHistory: hist };
  }));
}

/* -------- Searchable dropdown (Event / Sales Person pickers) -------- */
function SearchableSelect({ value, onChange, options, placeholder = "Search…", renderLabel, renderOption, className }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const ref = useRef(null);
  useEffect(() => {
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);
  const selected = options.find(o => o.id === value);
  const filtered = q.trim() ? options.filter(o => (o.searchText || o.label).toLowerCase().includes(q.toLowerCase())) : options;
  return (
    <div className="relative" ref={ref}>
      <button type="button" onClick={() => setOpen(o => !o)} className={classNames("w-full flex items-center justify-between px-3 py-2 text-sm border border-gray-300 rounded-md bg-white hover:border-gray-400", className)}>
        <span className="truncate text-left">{selected ? (renderLabel ? renderLabel(selected) : selected.label) : placeholder}</span>
        <Icon name="chevronDown" className="w-4 h-4 text-gray-400 shrink-0" />
      </button>
      {open && (
        <div className="absolute z-30 mt-1 w-full min-w-[240px] bg-white border border-gray-200 rounded-md shadow-lg fade-in">
          <div className="p-2 border-b border-gray-100">
            <input autoFocus className="w-full px-2 py-1.5 text-sm border border-gray-200 rounded" placeholder={placeholder} value={q} onChange={e => setQ(e.target.value)} />
          </div>
          <div className="max-h-56 overflow-y-auto py-1">
            {filtered.length === 0 && <div className="px-3 py-2 text-xs text-gray-400">No matches</div>}
            {filtered.map(o => (
              <button key={o.id} type="button" onClick={() => { onChange(o.id); setOpen(false); setQ(""); }}
                className={classNames("w-full text-left px-3 py-1.5 text-sm hover:bg-gray-50", o.id === value && "bg-brand-50 text-brand-800")}>
                {renderOption ? renderOption(o) : o.label}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* -------- POS product card (with inline price selector) -------- */
function POSProductCard({ product, onAdd }) {
  const promos = (product.promotions || []).filter(p => p.active);
  const priceOptions = [{ key: "rrp", label: "RRP", price: product.rrpPrice }, ...promos.map(p => ({ key: p.id, label: p.name, price: p.price }))];
  const [priceKey, setPriceKey] = useState("rrp");
  const chosen = priceOptions.find(p => p.key === priceKey) || priceOptions[0];
  const avail = availableStock(product);
  const outOfStock = avail <= 0;
  return (
    <div className={classNames("border border-gray-200 rounded-lg p-3 bg-white flex flex-col gap-1.5", outOfStock && "opacity-60")}>
      <div className="flex items-start justify-between gap-1">
        <div className="min-w-0">
          <div className="text-[10px] text-gray-400 truncate">{product.brand || "—"}</div>
          <div className="text-sm font-medium text-gray-900 leading-snug">{product.name}</div>
        </div>
        {outOfStock ? <Badge color="red">Out</Badge> : avail <= 10 ? <Badge color="amber">Low</Badge> : <Badge color="green">In stock</Badge>}
      </div>
      <div className="text-[11px] text-gray-400 font-mono truncate">{product.sku || product.barcode || "—"}</div>
      {priceOptions.length > 1 ? (
        <select className="text-xs border border-gray-200 rounded px-1.5 py-1 mt-1" value={priceKey} onChange={e => setPriceKey(e.target.value)} onClick={e => e.stopPropagation()}>
          {priceOptions.map(p => <option key={p.key} value={p.key}>{p.label} — {formatCurrency(p.price)}</option>)}
        </select>
      ) : (
        <div className="text-sm font-semibold text-gray-900 mt-1">{formatCurrency(product.rrpPrice)}</div>
      )}
      <div className="flex items-center justify-between mt-1.5">
        <span className="text-[11px] text-gray-400">Avail: {avail}</span>
        <Button size="sm" disabled={outOfStock || !chosen || !chosen.price} onClick={() => onAdd(product, chosen)}><Icon name="plus" className="w-3.5 h-3.5" />Add</Button>
      </div>
    </div>
  );
}

/* -------- Cart row -------- */
function CartRow({ item, onInc, onDec, onRemove, onQtyChange }) {
  const lineTotal = item.isGiveaway ? 0 : item.unitPrice * item.qty;
  return (
    <div className="flex items-center gap-2 py-2 border-b border-gray-100 last:border-0">
      <div className="flex-1 min-w-0">
        <div className="text-sm font-medium text-gray-900 truncate">
          {item.name}{item.isGiveaway && <span className="ml-1.5 align-middle"><Badge color="blue">Giveaway</Badge></span>}
        </div>
        <div className="text-[11px] text-gray-400">{item.isGiveaway ? (item.remark || "No charge") : `${formatCurrency(item.unitPrice)} · ${item.priceLabel}`}</div>
      </div>
      <div className="flex items-center gap-1 shrink-0">
        <button onClick={onDec} className="w-6 h-6 rounded border border-gray-300 flex items-center justify-center text-gray-500 hover:bg-gray-50">−</button>
        <input type="number" min="1" className="w-10 text-center text-xs border border-gray-200 rounded py-0.5" value={item.qty} onChange={e => onQtyChange(Math.max(1, Number(e.target.value) || 1))} />
        <button onClick={onInc} className="w-6 h-6 rounded border border-gray-300 flex items-center justify-center text-gray-500 hover:bg-gray-50">+</button>
      </div>
      <div className="w-16 text-right text-sm font-medium shrink-0">{formatCurrency(lineTotal)}</div>
      <button onClick={onRemove} className="p-1 text-gray-400 hover:text-red-500 shrink-0"><Icon name="x" className="w-3.5 h-3.5" /></button>
    </div>
  );
}

/* -------- Giveaway modal -------- */
function GiveawayModal({ open, products, onClose, onAdd }) {
  const [mode, setMode] = useState("inventory");
  const [search, setSearch] = useState("");
  const [qty, setQty] = useState(1);
  const [remark, setRemark] = useState("");
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [customName, setCustomName] = useState("");
  useEffect(() => { if (open) { setSearch(""); setQty(1); setRemark(""); setSelectedProduct(null); setCustomName(""); setMode("inventory"); } }, [open]);
  if (!open) return null;
  const q = search.trim().toLowerCase();
  const results = q ? products.filter(p => availableStock(p) > 0 && ((p.name || "").toLowerCase().includes(q) || (p.brand || "").toLowerCase().includes(q) || (p.sku || "").toLowerCase().includes(q) || (p.barcode || "").toLowerCase().includes(q))).slice(0, 20) : [];

  function submit() {
    if (mode === "inventory") {
      if (!selectedProduct || qty < 1) return;
      onAdd({ productId: selectedProduct.id, name: selectedProduct.name, brand: selectedProduct.brand, sku: selectedProduct.sku, unitPrice: 0, priceLabel: "Giveaway", qty, isGiveaway: true, remark });
    } else {
      if (!customName.trim() || qty < 1) return;
      onAdd({ productId: null, name: customName.trim(), brand: "", sku: "", unitPrice: 0, priceLabel: "Giveaway (custom)", qty, isGiveaway: true, remark });
    }
  }

  return (
    <Modal open={open} onClose={onClose} title="Add Giveaway" width="max-w-lg"
      footer={<><Button variant="outline" onClick={onClose}>Cancel</Button><Button onClick={submit}>Add Giveaway</Button></>}>
      <div className="grid grid-cols-2 gap-2 mb-4">
        {[["inventory", "From Inventory"], ["custom", "Custom Item"]].map(([m, label]) => (
          <button key={m} onClick={() => setMode(m)} className={classNames("px-2 py-2 rounded-md text-xs font-medium border", mode === m ? "bg-brand-700 border-brand-700 text-white" : "border-gray-300 text-gray-600 hover:bg-gray-50")}>{label}</button>
        ))}
      </div>
      {mode === "inventory" ? (
        <div>
          <Field label="Search product">
            <input className={inputCls} value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name, brand, barcode, SKU…" />
          </Field>
          {selectedProduct ? (
            <div className="flex items-center justify-between bg-brand-50 border border-brand-200 rounded-md px-3 py-2 text-sm mb-3">
              <span>{selectedProduct.name}</span>
              <button className="text-xs text-gray-500 hover:text-gray-700" onClick={() => setSelectedProduct(null)}>Change</button>
            </div>
          ) : (
            <div className="border border-gray-200 rounded-md max-h-40 overflow-y-auto mb-3">
              {results.map(p => (
                <button key={p.id} onClick={() => setSelectedProduct(p)} className="w-full text-left px-3 py-1.5 text-sm hover:bg-gray-50 border-b border-gray-50 last:border-0">{p.name} <span className="text-gray-400 text-xs">· {availableStock(p)} avail</span></button>
              ))}
              {q && results.length === 0 && <div className="px-3 py-2 text-xs text-gray-400">No matches</div>}
            </div>
          )}
        </div>
      ) : (
        <Field label="Item name"><input className={inputCls} value={customName} onChange={e => setCustomName(e.target.value)} placeholder="e.g. Branded Keychain" /></Field>
      )}
      <div className="grid grid-cols-2 gap-3">
        <Field label="Quantity"><input type="number" min="1" className={inputCls} value={qty} onChange={e => setQty(Math.max(1, Number(e.target.value) || 1))} /></Field>
        <Field label="Remark"><input className={inputCls} value={remark} onChange={e => setRemark(e.target.value)} placeholder="Optional" /></Field>
      </div>
    </Modal>
  );
}

          <div>Payment Method</div><div className="text-right font-medium text-gray-900">{order.paymentMethod}</div>

        </div>
