}

/* -------- Edit order modal (fields + line items, with stock reconciliation
   handled by the caller via reconcileOrderItemStock) -------- */
function EditOrderModal({ order, events, salesPeople, paymentMethods, onSave, onClose }) {
  const [form, setForm] = useState(null);
  useEffect(() => {
    if (order) {
      setForm({
        eventId: order.eventId, salesPersonId: order.salesPersonId, paymentMethodId: order.paymentMethodId,
        customerName: order.customerName || "", customerPhone: order.customerPhone || "", customerRemark: order.customerRemark || "",
        discount: order.discount || 0,
        items: order.items.map(it => ({ ...it })),
      });
    } else {
      setForm(null);
    }
  }, [order && order.id]);
  if (!order || !form) return null;

  function set(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function setItemQty(idx, qty) { setForm(f => ({ ...f, items: f.items.map((it, i) => i === idx ? { ...it, qty: Math.max(1, qty) } : it) })); }
  function removeItem(idx) { setForm(f => ({ ...f, items: f.items.filter((_, i) => i !== idx) })); }

  const subtotal = form.items.reduce((s, it) => s + (it.isGiveaway ? 0 : it.unitPrice * it.qty), 0);
  const total = Math.max(0, subtotal - (Number(form.discount) || 0));

  function submit() {
    const ev = events.find(e => e.id === form.eventId);
    const sp = salesPeople.find(s => s.id === form.salesPersonId);
    const pm = paymentMethods.find(p => p.id === form.paymentMethodId);
    onSave(order, {
      eventId: form.eventId, eventName: ev ? ev.name : order.eventName,
      salesPersonId: form.salesPersonId, salesPersonName: sp ? sp.name : order.salesPersonName, salesPersonPosition: sp ? sp.position : order.salesPersonPosition,
      paymentMethodId: form.paymentMethodId, paymentMethod: pm ? pm.name : order.paymentMethod,
      customerName: form.customerName, customerPhone: form.customerPhone, customerRemark: form.customerRemark,
      items: form.items, subtotal, discount: Number(form.discount) || 0, total,
    });
  }

  return (
    <Modal open={!!order} onClose={onClose} title={`Edit Order — ${order.orderNumber}`} width="max-w-lg"
      footer={<><Button variant="outline" onClick={onClose}>Cancel</Button><Button onClick={submit}>Save Changes</Button></>}>
      <div className="grid grid-cols-2 gap-3 mb-3">
        <Field label="Event"><select className={inputCls} value={form.eventId} onChange={e => set("eventId", e.target.value)}>{events.map(ev => <option key={ev.id} value={ev.id}>{ev.name}</option>)}</select></Field>
        <Field label="Sales Person"><select className={inputCls} value={form.salesPersonId} onChange={e => set("salesPersonId", e.target.value)}>{salesPeople.map(sp => <option key={sp.id} value={sp.id}>{sp.name}</option>)}</select></Field>
        <Field label="Payment Method"><select className={inputCls} value={form.paymentMethodId} onChange={e => set("paymentMethodId", e.target.value)}>{paymentMethods.map(pm => <option key={pm.id} value={pm.id}>{pm.name}</option>)}</select></Field>
        <Field label="Discount (THB)"><input type="number" min="0" className={inputCls} value={form.discount} onChange={e => set("discount", Math.max(0, Number(e.target.value) || 0))} /></Field>
        <Field label="Customer Name"><input className={inputCls} value={form.customerName} onChange={e => set("customerName", e.target.value)} /></Field>
        <Field label="Phone"><input className={inputCls} value={form.customerPhone} onChange={e => set("customerPhone", e.target.value)} /></Field>
      </div>
      <div className="text-xs font-medium text-gray-600 mb-1.5">Items</div>
      <div className="border border-gray-200 rounded-md divide-y divide-gray-100 mb-3 max-h-56 overflow-y-auto">
        {form.items.map((it, i) => (
          <div key={i} className="flex items-center gap-2 px-3 py-2 text-sm">
            <div className="flex-1 min-w-0 truncate">{it.name}{it.isGiveaway && <span className="ml-1.5 align-middle"><Badge color="blue">Giveaway</Badge></span>}</div>
            <input type="number" min="1" className="w-16 text-center text-xs border border-gray-200 rounded py-1" value={it.qty} onChange={e => setItemQty(i, Number(e.target.value) || 1)} />
            <div className="w-16 text-right text-xs shrink-0">{formatCurrency(it.isGiveaway ? 0 : it.unitPrice * it.qty)}</div>
            <button onClick={() => removeItem(i)} className="p-1 text-gray-400 hover:text-red-500 shrink-0"><Icon name="x" className="w-3.5 h-3.5" /></button>
          </div>
        ))}
        {form.items.length === 0 && <div className="px-3 py-4 text-xs text-gray-400 text-center">No items left in this order.</div>}
      </div>
      <div className="flex justify-between text-sm font-semibold border-t border-gray-200 pt-2"><span>Total</span><span>{formatCurrency(total)}</span></div>
      <p className="text-[11px] text-gray-400 mt-2">Inventory stock is automatically adjusted to match any quantity changes you make here.</p>
    </Modal>
  );
}

/* -------- Delete order dialog (single or bulk, with restock choice) -------- */
function DeleteOrderDialog({ ordersToDelete, onClose, onConfirm }) {
  const [restock, setRestock] = useState(true);
  useEffect(() => { setRestock(true); }, [ordersToDelete]);
  if (!ordersToDelete || ordersToDelete.length === 0) return null;
  const count = ordersToDelete.length;
  const anyCountable = ordersToDelete.some(isCountableOrder);
  return (
    <Modal open={!!ordersToDelete} onClose={onClose} title={count > 1 ? `Delete ${count} Orders` : `Delete Order ${ordersToDelete[0].orderNumber}`} width="max-w-md"
      footer={<><Button variant="outline" onClick={onClose}>Cancel</Button><Button variant="danger" onClick={() => onConfirm(restock)}>Delete {count > 1 ? `${count} Orders` : "Order"}</Button></>}>
      <div className="flex gap-3 mb-4">
        <div className="shrink-0 text-red-500"><Icon name="alert" className="w-6 h-6" /></div>
        <p className="text-sm text-gray-600">This permanently removes {count > 1 ? `these ${count} orders` : "this order"} from the sales log and cannot be undone.</p>
      </div>
      {anyCountable && (
        <label className="flex items-center gap-2 text-sm border border-gray-200 rounded-md px-3 py-2.5 cursor-pointer">
          <input type="checkbox" checked={restock} onChange={e => setRestock(e.target.checked)} />
          Return sold quantities back to inventory stock (recommended)
        </label>
      )}
    </Modal>
  );
}

/* =========================================================================
   POS VIEW
   ========================================================================= */
const POS_FILTERS = [
  { key: "all", label: "All Products" },
  { key: "inStock", label: "In Stock" },
  { key: "outOfStock", label: "Out of Stock" },
  { key: "promotion", label: "Promotion" },
  { key: "lowStock", label: "Low Stock" },
];

function POSView({ currentUser, products, setProducts, events, salesPeople, paymentMethods, setPaymentMethods, orders, setOrders }) {
  const [subTab, setSubTab] = useState("sale"); // 'sale' | 'history'

  const [eventId, setEventId] = useState(events[0]?.id || "");
  const [salesPersonId, setSalesPersonId] = useState(salesPeople[0]?.id || "");
  const [paymentMethodId, setPaymentMethodId] = useState(paymentMethods[0]?.id || "");
  const [customerName, setCustomerName] = useState("");
  const [customerPhone, setCustomerPhone] = useState("");
  const [customerRemark, setCustomerRemark] = useState("");

  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [cart, setCart] = useState([]);
  const [discount, setDiscount] = useState(0);
  const [amountReceived, setAmountReceived] = useState("");

  const [showGiveaway, setShowGiveaway] = useState(false);
  const [showAddPM, setShowAddPM] = useState(false);
  const [newPMName, setNewPMName] = useState("");
  const [lastOrder, setLastOrder] = useState(null);
  const [viewOrder, setViewOrder] = useState(null);
  const [editOrderTarget, setEditOrderTarget] = useState(null);
  const [deleteOrderTargets, setDeleteOrderTargets] = useState(null); // array of orders, or null
  const [selectedOrderIds, setSelectedOrderIds] = useState(() => new Set());
  const [historySearch, setHistorySearch] = useState("");
  const [toasts, setToasts] = useState([]);

  function pushToast(message) {
    const id = genId("t");
    setToasts(t => [...t, { id, message }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2600);
  }

  const selectedEvent = events.find(e => e.id === eventId) || null;

  /* ---------- product grid ---------- */
  const matchedProducts = useMemo(() => {
    const q = search.trim().toLowerCase();
    let list = products;
    if (q) list = list.filter(p => (p.name || "").toLowerCase().includes(q) || (p.brand || "").toLowerCase().includes(q) || (p.barcode || "").toLowerCase().includes(q) || (p.sku || "").toLowerCase().includes(q));
    switch (filter) {
      case "inStock": list = list.filter(p => availableStock(p) > 10); break;
      case "outOfStock": list = list.filter(p => availableStock(p) <= 0); break;
      case "lowStock": list = list.filter(p => availableStock(p) > 0 && availableStock(p) <= 10); break;
      case "promotion": list = list.filter(p => (p.promotions || []).some(pr => pr.active)); break;
      default: break;
    }
    return list;
  }, [products, search, filter]);
  const visibleProducts = matchedProducts.slice(0, 60);

  /* ---------- cart ---------- */
  function addToCart(product, priceOption) {
    const avail = availableStock(product);
    const existingQty = cart.filter(c => c.productId === product.id).reduce((s, c) => s + c.qty, 0);
    if (existingQty >= avail) { pushToast(`Only ${avail} in stock`); return; }
    setCart(c => {
      const existing = c.find(ci => ci.productId === product.id && ci.priceLabel === priceOption.label);
      if (existing) return c.map(ci => ci === existing ? { ...ci, qty: ci.qty + 1 } : ci);
      return [...c, { cartId: genId("ci"), productId: product.id, name: product.name, brand: product.brand, sku: product.sku, unitPrice: priceOption.price, priceLabel: priceOption.label, qty: 1, isGiveaway: false, remark: "" }];
    });
  }
  function setCartQty(cartId, qty) {
    setCart(c => c.map(ci => {
      if (ci.cartId !== cartId) return ci;
      if (ci.isGiveaway) return { ...ci, qty: Math.max(1, qty) };
      const product = products.find(p => p.id === ci.productId);
      const avail = product ? availableStock(product) : 999999;
      return { ...ci, qty: Math.min(Math.max(1, qty), Math.max(1, avail)) };
    }));
  }
  function incQty(cartId) { const it = cart.find(c => c.cartId === cartId); if (it) setCartQty(cartId, it.qty + 1); }
  function decQty(cartId) { const it = cart.find(c => c.cartId === cartId); if (it) { if (it.qty <= 1) removeFromCart(cartId); else setCartQty(cartId, it.qty - 1); } }
  function removeFromCart(cartId) { setCart(c => c.filter(ci => ci.cartId !== cartId)); }
  function addGiveaway(item) { setCart(c => [...c, { cartId: genId("ci"), ...item }]); setShowGiveaway(false); }

  const subtotal = cart.reduce((s, it) => s + (it.isGiveaway ? 0 : it.unitPrice * it.qty), 0);
  const total = Math.max(0, subtotal - (Number(discount) || 0));
  const totalQty = cart.reduce((s, it) => s + it.qty, 0);
  const giveawayQty = cart.filter(it => it.isGiveaway).reduce((s, it) => s + it.qty, 0);
  const change = Math.max(0, (Number(amountReceived) || 0) - total);

  function resetCartForm() {
    setCart([]); setCustomerName(""); setCustomerPhone(""); setCustomerRemark(""); setAmountReceived(""); setDiscount(0);
  }

  function completeSale() {
    if (cart.length === 0) { pushToast("Cart is empty"); return; }
    if (!eventId) { pushToast("Select an event"); return; }
    if (!salesPersonId) { pushToast("Select a sales person"); return; }
    if (!paymentMethodId) { pushToast("Select a payment method"); return; }
    const recv = Number(amountReceived) || 0;
    if (recv < total) { pushToast("Amount received is less than the total"); return; }
    const ev = events.find(e => e.id === eventId);
    const sp = salesPeople.find(s => s.id === salesPersonId);
    const pm = paymentMethods.find(p => p.id === paymentMethodId);
    const orderNumber = nextOrderNumber(orders, new Date());
    const newOrder = {
      id: genId("ord"), orderNumber,
      eventId, eventName: ev?.name || "",
      salesPersonId, salesPersonName: sp?.name || "", salesPersonPosition: sp?.position || "",
      paymentMethodId, paymentMethod: pm?.name || "",
      customerName, customerPhone, customerRemark,
      items: cart.map(({ cartId, ...rest }) => rest),
      subtotal, discount: Number(discount) || 0, total,
      amountReceived: recv, change: recv - total,
      paymentStatus: "Paid", status: "completed", isDraft: false,
      createdAt: new Date().toISOString(),
    };
    setOrders(o => [newOrder, ...o]);
    applyOrderStockDeduction(setProducts, newOrder.items, { user: currentUser.name, orderNumber, eventName: newOrder.eventName });
    setLastOrder(newOrder);
    resetCartForm();
  }
  function saveDraft() {
    if (cart.length === 0) { pushToast("Cart is empty"); return; }
    const ev = events.find(e => e.id === eventId);
    const sp = salesPeople.find(s => s.id === salesPersonId);
    const pm = paymentMethods.find(p => p.id === paymentMethodId);
    const draft = {
      id: genId("ord"), orderNumber: "DRAFT-" + genId("d").slice(-6).toUpperCase(),
      eventId, eventName: ev?.name || "", salesPersonId, salesPersonName: sp?.name || "", salesPersonPosition: sp?.position || "",
      paymentMethodId, paymentMethod: pm?.name || "",
      customerName, customerPhone, customerRemark,
      items: cart.map(({ cartId, ...rest }) => rest),
      subtotal, discount: Number(discount) || 0, total,
      amountReceived: 0, change: 0, paymentStatus: "Draft", status: "draft", isDraft: true,
      createdAt: new Date().toISOString(),
    };
    setOrders(o => [draft, ...o]);
    pushToast("Draft saved");
    resetCartForm();
  }
  function cancelSale() { resetCartForm(); pushToast("Sale cancelled"); }

  function refundOrder(orderId) {
    const order = orders.find(o => o.id === orderId);
    if (!order || order.status !== "completed") return;
    setOrders(os => os.map(o => o.id === orderId ? { ...o, status: "refunded", paymentStatus: "Refunded" } : o));
    applyOrderStockRestock(setProducts, order.items, { user: currentUser.name, orderNumber: order.orderNumber });
    pushToast(`Order ${order.orderNumber} refunded`);
    setViewOrder(null);
  }
  function cancelDraft(orderId) {
    setOrders(os => os.map(o => o.id === orderId ? { ...o, status: "cancelled", paymentStatus: "Cancelled" } : o));
    pushToast("Draft cancelled");
    setViewOrder(null);
  }
  function duplicateOrder(order) {
    setEventId(order.eventId); setSalesPersonId(order.salesPersonId); setPaymentMethodId(order.paymentMethodId);
    setCustomerName(order.customerName || ""); setCustomerPhone(order.customerPhone || ""); setCustomerRemark(order.customerRemark || "");
    setCart(order.items.map(it => ({ cartId: genId("ci"), ...it })));
    setDiscount(order.discount || 0);
    setViewOrder(null);
    setSubTab("sale");
    pushToast("Order duplicated into cart — review and complete sale");
  }
  function addCustomPaymentMethod() {
    if (!newPMName.trim()) return;
    const pm = { id: genId("pm"), name: newPMName.trim(), builtIn: false };
    setPaymentMethods(p => [...p, pm]);
    setPaymentMethodId(pm.id);
    setNewPMName(""); setShowAddPM(false);
  }
  function saveOrderEdit(order, patch) {
    const wasCountable = isCountableOrder(order);
    setOrders(os => os.map(o => o.id === order.id ? { ...o, ...patch } : o));
    if (wasCountable) reconcileOrderItemStock(setProducts, order.items, patch.items, { user: currentUser.name, orderNumber: order.orderNumber });
    pushToast(`Order ${order.orderNumber} updated`);
    setEditOrderTarget(null);
    setViewOrder(null);
  }
  function deleteOrders(orderIds, restock) {
    const toDelete = orders.filter(o => orderIds.includes(o.id));
    if (restock) toDelete.forEach(o => { if (isCountableOrder(o)) applyOrderStockRestock(setProducts, o.items, { user: currentUser.name, orderNumber: o.orderNumber }); });
    setOrders(os => os.filter(o => !orderIds.includes(o.id)));
    setSelectedOrderIds(s => { const n = new Set(s); orderIds.forEach(id => n.delete(id)); return n; });
    pushToast(`${orderIds.length} order${orderIds.length !== 1 ? "s" : ""} deleted`);
    setDeleteOrderTargets(null);
    setViewOrder(null);
  }
  function toggleOrderSelect(id) { setSelectedOrderIds(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; }); }
  function toggleAllOrdersOnPage(pageOrders) {
    const ids = pageOrders.map(o => o.id);
    const allSelected = ids.every(id => selectedOrderIds.has(id));
    setSelectedOrderIds(s => { const n = new Set(s); allSelected ? ids.forEach(id => n.delete(id)) : ids.forEach(id => n.add(id)); return n; });
  }

  /* ---------- summary stats ---------- */
  const summary = useMemo(() => {
    const todayStr = new Date().toDateString();
    const completed = orders.filter(isCountableOrder);
    const today = completed.filter(o => new Date(o.createdAt).toDateString() === todayStr);
    const totalRevenue = completed.reduce((s, o) => s + o.total, 0);
    const todayRevenue = today.reduce((s, o) => s + o.total, 0);
    const unitsSold = completed.reduce((s, o) => s + orderUnits(o, false), 0);
    const giveawayUnits = completed.reduce((s, o) => s + (o.items || []).filter(it => it.isGiveaway).reduce((s2, it) => s2 + it.qty, 0), 0);
    return { totalRevenue, todayRevenue, totalOrders: completed.length, todayOrders: today.length, unitsSold, giveawayUnits, avgOrderValue: completed.length ? totalRevenue / completed.length : 0 };
  }, [orders]);

  const filteredOrders = useMemo(() => {
    const q = historySearch.trim().toLowerCase();
    if (!q) return orders;
    return orders.filter(o => o.orderNumber.toLowerCase().includes(q) || o.eventName.toLowerCase().includes(q) || o.salesPersonName.toLowerCase().includes(q) || o.paymentMethod.toLowerCase().includes(q) || formatDate(o.createdAt).toLowerCase().includes(q) || o.items.some(it => it.name.toLowerCase().includes(q)));
  }, [orders, historySearch]);

  const eventOptions = events.map(e => ({ id: e.id, label: e.name, searchText: `${e.name} ${e.location}`, date: e.date, location: e.location }));
  const spOptions = salesPeople.map(s => ({ id: s.id, label: `${s.name} — ${s.position}`, searchText: `${s.name} ${s.position}` }));

  return (
    <div className="px-6 py-5 max-w-[1600px] mx-auto">
      {/* summary cards */}
      <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-3 mb-5">
        {[
          ["Total Revenue", formatCurrency(summary.totalRevenue)],
          ["Today's Revenue", formatCurrency(summary.todayRevenue)],
          ["Total Orders", summary.totalOrders.toLocaleString()],
          ["Today's Orders", summary.todayOrders.toLocaleString()],
          ["Units Sold", summary.unitsSold.toLocaleString()],
          ["Giveaway Units", summary.giveawayUnits.toLocaleString()],
          ["Avg Order Value", formatCurrency(Math.round(summary.avgOrderValue))],
        ].map(([label, val]) => (
          <div key={label} className="bg-white border border-gray-200 rounded-lg p-3">
            <div className="text-[10px] text-gray-500 mb-1">{label}</div>
            <div className="text-base font-semibold text-gray-900">{val}</div>
          </div>
        ))}
      </div>

      <div className="flex items-center gap-1 bg-gray-100 rounded-md p-1 mb-4 w-fit">
        {[["sale", "New Sale"], ["history", "Order History"]].map(([k, label]) => (
          <button key={k} onClick={() => setSubTab(k)} className={classNames("px-3.5 py-1.5 rounded text-sm font-medium", subTab === k ? "bg-white text-brand-800 shadow-sm" : "text-gray-500 hover:text-gray-700")}>{label}</button>
        ))}
      </div>

      {subTab === "sale" ? (
        <div className="grid grid-cols-1 lg:grid-cols-[1fr_380px] gap-4 items-start">
          {/* LEFT: event/sales info + product grid */}
          <div className="space-y-4">
            <div className="bg-white border border-gray-200 rounded-lg p-4">
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <Field label="Event *">
                  <SearchableSelect value={eventId} onChange={setEventId} options={eventOptions} placeholder="Search events…" />
                  {selectedEvent && <p className="text-[11px] text-gray-400 mt-1">{formatDate(selectedEvent.date)} · {selectedEvent.location}</p>}
                </Field>
                <Field label="Sales Person *">
                  <SearchableSelect value={salesPersonId} onChange={setSalesPersonId} options={spOptions} placeholder="Search staff…" />
                </Field>
                <Field label="Payment Method *">

/* =========================================================================
   DASHBOARD — date/bucket helpers + hand-rolled SVG charts (no chart-lib
   dependency, so the demo has zero risk of a broken CDN import).
   ========================================================================= */
function getDateRange(preset, customFrom, customTo) {
  const now = new Date();
  const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const endOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate(), 23, 59, 59, 999);
  if (preset === "today") return [startOfDay(now), endOfDay(now)];
  if (preset === "yesterday") { const y = new Date(now); y.setDate(y.getDate() - 1); return [startOfDay(y), endOfDay(y)]; }
  if (preset === "thisWeek") { const d = new Date(now); const day = d.getDay(); const diff = day === 0 ? 6 : day - 1; const monday = new Date(d); monday.setDate(d.getDate() - diff); return [startOfDay(monday), endOfDay(now)]; }
  if (preset === "thisMonth") return [new Date(now.getFullYear(), now.getMonth(), 1), endOfDay(now)];
  if (preset === "thisYear") return [new Date(now.getFullYear(), 0, 1), endOfDay(now)];
  if (preset === "custom") return [customFrom ? startOfDay(new Date(customFrom)) : null, customTo ? endOfDay(new Date(customTo)) : null];
  return [null, null];
}
function bucketKey(dateStr, grouping) {
  const d = new Date(dateStr);
  if (grouping === "hourly") return d.toISOString().slice(0, 13);
  if (grouping === "weekly") { const onejan = new Date(d.getFullYear(), 0, 1); const week = Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7); return `${d.getFullYear()}-W${pad(week, 2)}`; }
  if (grouping === "monthly") return `${d.getFullYear()}-${pad(d.getMonth() + 1, 2)}`;
  if (grouping === "yearly") return `${d.getFullYear()}`;
  return d.toISOString().slice(0, 10); // daily
}
const MONTH_ABBR = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
function shortenBucketLabel(key, grouping) {
  if (grouping === "hourly") return key.slice(11, 13) + ":00";
  if (grouping === "weekly") return key.split("-")[1];
  if (grouping === "monthly") { const [y, m] = key.split("-"); return `${MONTH_ABBR[Number(m) - 1]} ${y}`; }
  if (grouping === "yearly") return key;
  const [y, m, d] = key.split("-"); return `${MONTH_ABBR[Number(m) - 1]} ${Number(d)}`;
}
const CHART_PALETTE = ["#227058", "#2563eb", "#d97706", "#dc2626", "#7c3aed", "#0891b2", "#65a30d"];

function LineChartSVG({ data, height = 180, color = "#227058" }) {
  const width = 640;
  const padding = { top: 12, right: 12, bottom: 22, left: 8 };
  const max = Math.max(1, ...data.map(d => d.value));
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const stepX = data.length > 1 ? innerW / (data.length - 1) : 0;
  const points = data.map((d, i) => [padding.left + i * stepX, padding.top + innerH - (d.value / max) * innerH]);
  const linePath = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const areaPath = points.length ? linePath + ` L${(padding.left + innerW).toFixed(1)},${(padding.top + innerH).toFixed(1)} L${padding.left},${(padding.top + innerH).toFixed(1)} Z` : "";
  const [hoverIdx, setHoverIdx] = useState(null);
  const labelEvery = Math.max(1, Math.ceil(data.length / 8));
  if (data.length === 0) return <div className="h-[180px] flex items-center justify-center text-xs text-gray-400">No data for this period.</div>;
  return (
    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto" onMouseLeave={() => setHoverIdx(null)}>
      <line x1={padding.left} y1={padding.top + innerH} x2={padding.left + innerW} y2={padding.top + innerH} stroke="#e5e7eb" />
      <path d={areaPath} fill={color} fillOpacity="0.08" stroke="none" />
      <path d={linePath} fill="none" stroke={color} strokeWidth="2" />
      {points.map((p, i) => (
        <rect key={i} x={p[0] - stepX / 2} y={padding.top} width={Math.max(stepX, 4)} height={innerH} fill="transparent" onMouseEnter={() => setHoverIdx(i)} />
      ))}
      {points.map((p, i) => <circle key={"c" + i} cx={p[0]} cy={p[1]} r={hoverIdx === i ? 4 : 2.5} fill={color} pointerEvents="none" />)}
      {hoverIdx !== null && (
        <g pointerEvents="none">
          <line x1={points[hoverIdx][0]} y1={padding.top} x2={points[hoverIdx][0]} y2={padding.top + innerH} stroke="#9ca3af" strokeDasharray="3,3" />
          <text x={Math.min(Math.max(points[hoverIdx][0], 60), width - 90)} y={padding.top + 12} className="text-[10px] fill-gray-700 font-medium">{data[hoverIdx].label}: {formatCurrency(data[hoverIdx].value)}</text>
        </g>
      )}
      {data.map((d, i) => (i % labelEvery === 0) && <text key={"t" + i} x={points[i][0]} y={height - 6} textAnchor="middle" className="text-[9px] fill-gray-400">{d.label}</text>)}
    </svg>
  );
}
function BarListChart({ data, valueFormatter = formatCurrency, color = "#227058" }) {
  const max = Math.max(1, ...data.map(d => d.value));
  if (!data.length) return <p className="text-xs text-gray-400 italic py-4 text-center">No data.</p>;
  return (
    <div className="space-y-2.5">
      {data.map((d, i) => (
        <div key={i} className="flex items-center gap-2 text-xs">
          <div className="w-32 truncate text-gray-600 shrink-0">{d.label}</div>
          <div className="flex-1 bg-gray-100 rounded h-3 overflow-hidden">
            <div className="h-full rounded" style={{ width: `${(d.value / max) * 100}%`, backgroundColor: color }} />
          </div>
          <div className="w-20 text-right font-medium text-gray-800 shrink-0">{valueFormatter(d.value)}</div>
        </div>
      ))}
    </div>
  );
}
function DonutChart({ data, size = 150 }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const radius = size / 2 - 12, cx = size / 2, cy = size / 2, circumference = 2 * Math.PI * radius;
  let cumulative = 0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      <circle cx={cx} cy={cy} r={radius} fill="none" stroke="#f3f4f6" strokeWidth="18" />
      {data.map((d, i) => {
        const frac = d.value / total;
        const dash = frac * circumference;
        const offset = -cumulative * circumference;
        cumulative += frac;
        return <circle key={i} cx={cx} cy={cy} r={radius} fill="none" stroke={d.color} strokeWidth="18"
          strokeDasharray={`${dash} ${Math.max(0, circumference - dash)}`} strokeDashoffset={offset} transform={`rotate(-90 ${cx} ${cy})`} />;
      })}
      <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" className="text-xs font-semibold fill-gray-800">{formatCurrency(total)}</text>
    </svg>
  );
}
function MultiSelectDropdown({ label, options, selected, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);
  const allSelected = selected.length === 0;
  return (
    <div className="relative" ref={ref}>
      <button type="button" onClick={() => setOpen(o => !o)} className="flex items-center justify-between gap-2 px-3 py-2 text-sm border border-gray-300 rounded-md bg-white hover:border-gray-400 min-w-[160px]">
        <span className="truncate">{label}: {allSelected ? "All" : `${selected.length} selected`}</span>
        <Icon name="chevronDown" className="w-4 h-4 text-gray-400 shrink-0" />
      </button>
      {open && (
        <div className="absolute z-30 mt-1 w-56 bg-white border border-gray-200 rounded-md shadow-lg fade-in py-1 max-h-64 overflow-y-auto">
          <label className="flex items-center gap-2 px-3 py-1.5 text-sm hover:bg-gray-50 cursor-pointer border-b border-gray-100">
            <input type="checkbox" checked={allSelected} onChange={() => onChange([])} />All {label}
          </label>
          {options.map(o => (
            <label key={o.id} className="flex items-center gap-2 px-3 py-1.5 text-sm hover:bg-gray-50 cursor-pointer">
              <input type="checkbox" checked={selected.includes(o.id)} onChange={() => onChange(selected.includes(o.id) ? selected.filter(id => id !== o.id) : [...selected, o.id])} />
              {o.label}
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

function EventDetailModal({ event, orders, onClose }) {
  if (!event) return null;
  const evOrders = orders.filter(o => o.eventId === event.id && isCountableOrder(o));
  const revenue = evOrders.reduce((s, o) => s + o.total, 0);
  const unitsSold = evOrders.reduce((s, o) => s + orderUnits(o, false), 0);
  const giveaways = evOrders.reduce((s, o) => s + (o.items || []).filter(it => it.isGiveaway).reduce((s2, it) => s2 + it.qty, 0), 0);
  const bySP = {}; evOrders.forEach(o => { bySP[o.salesPersonName] = (bySP[o.salesPersonName] || 0) + o.total; });
  const bestSP = Object.entries(bySP).sort((a, b) => b[1] - a[1])[0];
  const byProduct = {}; evOrders.forEach(o => o.items.forEach(it => { if (!it.isGiveaway) byProduct[it.name] = (byProduct[it.name] || 0) + it.unitPrice * it.qty; }));
  const bestProducts = Object.entries(byProduct).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const byPM = {}; evOrders.forEach(o => { byPM[o.paymentMethod] = (byPM[o.paymentMethod] || 0) + o.total; });
  const byPromo = {}; evOrders.forEach(o => o.items.forEach(it => { if (it.priceLabel && it.priceLabel !== "RRP" && !it.isGiveaway) byPromo[it.priceLabel] = (byPromo[it.priceLabel] || 0) + it.qty; }));

  return (
    <Modal open={!!event} onClose={onClose} title={`Event — ${event.name}`} width="max-w-2xl">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
        {[["Revenue", formatCurrency(revenue)], ["Orders", evOrders.length], ["Units Sold", unitsSold], ["Giveaways", giveaways]].map(([l, v]) => (
          <div key={l} className="bg-gray-50 rounded-md p-2.5"><div className="text-[10px] text-gray-500">{l}</div><div className="font-semibold text-gray-900">{v}</div></div>
        ))}
      </div>
      <div className="grid grid-cols-2 gap-4 text-sm">
        <div>
          <div className="text-xs font-medium text-gray-600 mb-1.5">Best Sales Person</div>
          <p className="text-gray-800 mb-3">{bestSP ? `${bestSP[0]} — ${formatCurrency(bestSP[1])}` : "—"}</p>
          <div className="text-xs font-medium text-gray-600 mb-1.5">Payment Breakdown</div>
          {Object.keys(byPM).length === 0 && <p className="text-xs text-gray-400">—</p>}
          {Object.entries(byPM).map(([k, v]) => <div key={k} className="flex justify-between text-xs py-0.5"><span className="text-gray-500">{k}</span><span>{formatCurrency(v)}</span></div>)}
        </div>
        <div>
          <div className="text-xs font-medium text-gray-600 mb-1.5">Best Selling Products</div>
          {bestProducts.length === 0 && <p className="text-xs text-gray-400 mb-3">—</p>}
          {bestProducts.map(([name, rev]) => <div key={name} className="flex justify-between text-xs py-0.5"><span className="text-gray-700 truncate">{name}</span><span>{formatCurrency(rev)}</span></div>)}
          <div className="text-xs font-medium text-gray-600 mb-1.5 mt-3">Promotion Usage</div>
          {Object.keys(byPromo).length === 0 && <p className="text-xs text-gray-400">No promotions used.</p>}
          {Object.entries(byPromo).map(([k, v]) => <div key={k} className="flex justify-between text-xs py-0.5"><span className="text-gray-500">{k}</span><span>{v} units</span></div>)}
        </div>
      </div>
      <div className="flex justify-end pt-4"><Button variant="outline" onClick={onClose}>Close</Button></div>
    </Modal>
  );
}

const DATE_PRESET_OPTIONS = [
  { key: "today", label: "Today" }, { key: "yesterday", label: "Yesterday" },
  { key: "thisWeek", label: "This Week" }, { key: "thisMonth", label: "This Month" },
  { key: "thisYear", label: "This Year" }, { key: "custom", label: "Custom Range" },
];
const GROUPING_OPTIONS = [["hourly", "Hourly"], ["daily", "Daily"], ["weekly", "Weekly"], ["monthly", "Monthly"], ["yearly", "Yearly"]];
const LOW_STOCK_THRESHOLD = 10;

function DashboardView({ currentUser, products, setProducts, events, salesPeople, paymentMethods, orders, setOrders }) {
  const [preset, setPreset] = useState("thisMonth");
  const [customFrom, setCustomFrom] = useState("");
  const [customTo, setCustomTo] = useState("");
  const [eventFilter, setEventFilter] = useState([]);
  const [salesPersonFilter, setSalesPersonFilter] = useState("all");
  const [paymentFilter, setPaymentFilter] = useState("all");
  const [grouping, setGrouping] = useState("daily");
  const [detailEvent, setDetailEvent] = useState(null);
  const [detailOrder, setDetailOrder] = useState(null);
  const [editOrderTarget, setEditOrderTarget] = useState(null);
  const [deleteOrderTargets, setDeleteOrderTargets] = useState(null);
  const [toasts, setToasts] = useState([]);
  function pushToast(message) {
    const id = genId("t");
    setToasts(t => [...t, { id, message }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2600);
  }
  function refundOrder(orderId) {
    const order = orders.find(o => o.id === orderId);
    if (!order || order.status !== "completed") return;
    setOrders(os => os.map(o => o.id === orderId ? { ...o, status: "refunded", paymentStatus: "Refunded" } : o));
    applyOrderStockRestock(setProducts, order.items, { user: currentUser.name, orderNumber: order.orderNumber });
    pushToast(`Order ${order.orderNumber} refunded`);
    setDetailOrder(null);
  }
  function cancelDraft(orderId) {
    setOrders(os => os.map(o => o.id === orderId ? { ...o, status: "cancelled", paymentStatus: "Cancelled" } : o));
    pushToast("Draft cancelled");
    setDetailOrder(null);
  }
  function saveOrderEdit(order, patch) {
    const wasCountable = isCountableOrder(order);
    setOrders(os => os.map(o => o.id === order.id ? { ...o, ...patch } : o));
    if (wasCountable) reconcileOrderItemStock(setProducts, order.items, patch.items, { user: currentUser.name, orderNumber: order.orderNumber });
    pushToast(`Order ${order.orderNumber} updated`);
    setEditOrderTarget(null);
  }
  function deleteOrders(orderIds, restock) {
    const toDelete = orders.filter(o => orderIds.includes(o.id));
    if (restock) toDelete.forEach(o => { if (isCountableOrder(o)) applyOrderStockRestock(setProducts, o.items, { user: currentUser.name, orderNumber: o.orderNumber }); });
    setOrders(os => os.filter(o => !orderIds.includes(o.id)));
    pushToast(`${orderIds.length} order${orderIds.length !== 1 ? "s" : ""} deleted`);
    setDeleteOrderTargets(null);
  }

  const [rangeStart, rangeEnd] = getDateRange(preset, customFrom, customTo);

  function inRange(o) {
    if (!isCountableOrder(o)) return false;
    const d = new Date(o.createdAt);
    if (rangeStart && d < rangeStart) return false;
    if (rangeEnd && d > rangeEnd) return false;
    if (eventFilter.length && !eventFilter.includes(o.eventId)) return false;
    if (salesPersonFilter !== "all" && o.salesPersonId !== salesPersonFilter) return false;
    if (paymentFilter !== "all" && o.paymentMethodId !== paymentFilter) return false;
    return true;
  }
  const filteredOrders = useMemo(() => orders.filter(inRange), [orders, rangeStart && rangeStart.getTime(), rangeEnd && rangeEnd.getTime(), eventFilter, salesPersonFilter, paymentFilter]);

  const prevPeriodRevenueByEvent = useMemo(() => {
    if (!rangeStart || !rangeEnd) return {};
    const durationMs = rangeEnd.getTime() - rangeStart.getTime();
    const prevEnd = new Date(rangeStart.getTime() - 1);
    const prevStart = new Date(prevEnd.getTime() - durationMs);
    const map = {};
    orders.forEach(o => {
      if (!isCountableOrder(o)) return;
      const d = new Date(o.createdAt);
      if (d < prevStart || d > prevEnd) return;
      if (salesPersonFilter !== "all" && o.salesPersonId !== salesPersonFilter) return;
      if (paymentFilter !== "all" && o.paymentMethodId !== paymentFilter) return;
      map[o.eventId] = (map[o.eventId] || 0) + o.total;
    });
    return map;
  }, [orders, rangeStart && rangeStart.getTime(), rangeEnd && rangeEnd.getTime(), salesPersonFilter, paymentFilter]);

  const kpi = useMemo(() => {
    const grossRevenue = filteredOrders.reduce((s, o) => s + o.subtotal, 0);
    const netRevenue = filteredOrders.reduce((s, o) => s + o.total, 0);
    const totalOrders = filteredOrders.length;
    const unitsSold = filteredOrders.reduce((s, o) => s + orderUnits(o, false), 0);
    const giveaways = filteredOrders.reduce((s, o) => s + (o.items || []).filter(it => it.isGiveaway).reduce((s2, it) => s2 + it.qty, 0), 0);
    const avgOrderValue = totalOrders ? netRevenue / totalOrders : 0;
    const inventoryValue = products.reduce((s, p) => s + (p.rrpPrice || 0) * p.currentStock, 0);
    return { grossRevenue, netRevenue, totalOrders, unitsSold, giveaways, avgOrderValue, inventoryValue };
  }, [filteredOrders, products]);

  const trendData = useMemo(() => {
    const buckets = {};
    filteredOrders.forEach(o => { const k = bucketKey(o.createdAt, grouping); buckets[k] = (buckets[k] || 0) + o.total; });
    return Object.keys(buckets).sort().map(k => ({ label: shortenBucketLabel(k, grouping), value: buckets[k] }));
  }, [filteredOrders, grouping]);

  const salesByEvent = useMemo(() => events.map(ev => {
    const evOrders = filteredOrders.filter(o => o.eventId === ev.id);
    const revenue = evOrders.reduce((s, o) => s + o.total, 0);
    const unitsSold = evOrders.reduce((s, o) => s + orderUnits(o, false), 0);
    const prevRevenue = prevPeriodRevenueByEvent[ev.id] || 0;
    const growthPct = prevRevenue > 0 ? ((revenue - prevRevenue) / prevRevenue) * 100 : (revenue > 0 ? 100 : 0);
    return { event: ev, revenue, orders: evOrders.length, unitsSold, avgOrderValue: evOrders.length ? revenue / evOrders.length : 0, growthPct };
  }).filter(r => r.orders > 0).sort((a, b) => b.revenue - a.revenue), [filteredOrders, events, prevPeriodRevenueByEvent]);

  const productAgg = useMemo(() => {
    const map = {};
    filteredOrders.forEach(o => o.items.forEach(it => {
      if (it.isGiveaway) return;
      const key = it.productId || it.name;
      if (!map[key]) map[key] = { name: it.name, revenue: 0, units: 0 };
      map[key].revenue += it.unitPrice * it.qty;
      map[key].units += it.qty;
    }));
    return Object.values(map);
  }, [filteredOrders]);
  const totalRevenueForPct = productAgg.reduce((s, p) => s + p.revenue, 0) || 1;
  const totalUnitsForPct = productAgg.reduce((s, p) => s + p.units, 0) || 1;
  const topByRevenue = [...productAgg].sort((a, b) => b.revenue - a.revenue).slice(0, 5);
  const topByUnits = [...productAgg].sort((a, b) => b.units - a.units).slice(0, 5);

  const spPerf = useMemo(() => salesPeople.map(sp => {
    const spOrders = filteredOrders.filter(o => o.salesPersonId === sp.id);
    const revenue = spOrders.reduce((s, o) => s + o.total, 0);
    const units = spOrders.reduce((s, o) => s + orderUnits(o, false), 0);
    const byProduct = {};
    spOrders.forEach(o => o.items.forEach(it => { if (!it.isGiveaway) byProduct[it.name] = (byProduct[it.name] || 0) + it.qty; }));
    const best = Object.entries(byProduct).sort((a, b) => b[1] - a[1])[0];
    return { sp, revenue, orders: spOrders.length, units, avgOrder: spOrders.length ? revenue / spOrders.length : 0, bestProduct: best ? best[0] : "—" };
  }).filter(r => r.orders > 0).sort((a, b) => b.revenue - a.revenue), [filteredOrders, salesPeople]);

  const paymentAgg = useMemo(() => {
    const map = {};
    filteredOrders.forEach(o => { if (!map[o.paymentMethod]) map[o.paymentMethod] = { name: o.paymentMethod, revenue: 0, orders: 0 }; map[o.paymentMethod].revenue += o.total; map[o.paymentMethod].orders += 1; });
    const total = Object.values(map).reduce((s, m) => s + m.revenue, 0) || 1;
    return Object.values(map).map((m, i) => ({ ...m, pct: (m.revenue / total) * 100, color: CHART_PALETTE[i % CHART_PALETTE.length] })).sort((a, b) => b.revenue - a.revenue);
  }, [filteredOrders]);

  const promoAgg = useMemo(() => {
    const map = {}; const orderSets = {};
    filteredOrders.forEach(o => o.items.forEach(it => {
      if (it.isGiveaway || !it.priceLabel || it.priceLabel === "RRP") return;
      const product = products.find(p => p.id === it.productId);
      const rrp = product?.rrpPrice ?? it.unitPrice;
      if (!map[it.priceLabel]) map[it.priceLabel] = { name: it.priceLabel, revenue: 0, units: 0, discountSum: 0, discountCount: 0 };
      map[it.priceLabel].revenue += it.unitPrice * it.qty;
      map[it.priceLabel].units += it.qty;
      map[it.priceLabel].discountSum += Math.max(0, rrp - it.unitPrice);
      map[it.priceLabel].discountCount += 1;
      orderSets[it.priceLabel] = orderSets[it.priceLabel] || new Set();
      orderSets[it.priceLabel].add(o.id);
    }));
    return Object.values(map).map(m => ({ ...m, orders: orderSets[m.name] ? orderSets[m.name].size : 0, avgDiscount: m.discountCount ? m.discountSum / m.discountCount : 0 })).sort((a, b) => b.revenue - a.revenue);
  }, [filteredOrders, products]);

  const lowStockProducts = useMemo(() => products
    .filter(p => availableStock(p) <= LOW_STOCK_THRESHOLD)
    .map(p => ({ product: p, avail: availableStock(p), allocated: allocatedEventStock(p), reorder: Math.max(LOW_STOCK_THRESHOLD * 2 - availableStock(p), LOW_STOCK_THRESHOLD) }))
    .sort((a, b) => a.avail - b.avail).slice(0, 50), [products]);

  const recentOrders = useMemo(() => [...filteredOrders].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 20), [filteredOrders]);

  function buildReportRows(type) {
    switch (type) {
      case "sales": return filteredOrders.map(o => ({ "Order #": o.orderNumber, Date: formatDateTime(o.createdAt), Event: o.eventName, "Sales Person": o.salesPersonName, "Payment Method": o.paymentMethod, Subtotal: o.subtotal, Discount: o.discount, Total: o.total, Status: o.status }));
      case "event": return salesByEvent.map(r => ({ Event: r.event.name, Revenue: r.revenue, Orders: r.orders, "Units Sold": r.unitsSold, "Avg Order Value": Math.round(r.avgOrderValue), "Growth %": r.growthPct.toFixed(1) }));
      case "salesperson": return spPerf.map(r => ({ "Sales Person": r.sp.name, Position: r.sp.position, Revenue: r.revenue, Orders: r.orders, "Units Sold": r.units, "Avg Order": Math.round(r.avgOrder), "Best Product": r.bestProduct }));
      case "payment": return paymentAgg.map(r => ({ "Payment Method": r.name, Revenue: r.revenue, Orders: r.orders, "% of Revenue": r.pct.toFixed(1) }));
      case "promotion": return promoAgg.map(r => ({ Promotion: r.name, Revenue: r.revenue, Orders: r.orders, "Units Sold": r.units, "Avg Discount": Math.round(r.avgDiscount) }));
      case "bestselling": return [...productAgg].sort((a, b) => b.revenue - a.revenue).map(r => ({ Product: r.name, Revenue: r.revenue, "Units Sold": r.units }));
      default: return [];
    }
  }
  function exportReport(type, format) {
    const rows = buildReportRows(type);
    const stamp = new Date().toISOString().slice(0, 10);
    if (!rows.length) return;
    if (format === "csv") { const csv = Papa.unparse(rows); const blob = new Blob([csv], { type: "text/csv" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${type}-report-${stamp}.csv`; a.click(); }
    else if (format === "xlsx") { const ws = XLSX.utils.json_to_sheet(rows); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report"); XLSX.writeFile(wb, `${type}-report-${stamp}.xlsx`); }
    else if (format === "pdf") { const doc = new window.jspdf.jsPDF({ orientation: "landscape" }); const head = [Object.keys(rows[0])]; const body = rows.map(r => Object.values(r)); doc.autoTable({ head, body, styles: { fontSize: 7 }, headStyles: { fillColor: [34, 112, 88] } }); doc.save(`${type}-report-${stamp}.pdf`); }
  }

  const eventOptions = events.map(e => ({ id: e.id, label: e.name }));
  const REPORT_TYPES = [["sales", "Sales Report"], ["event", "Event Report"], ["salesperson", "Sales Person Report"], ["payment", "Payment Report"], ["promotion", "Promotion Report"], ["bestselling", "Best Selling Products"]];

  return (
    <div className="px-6 py-5 max-w-[1600px] mx-auto">
      {/* filters */}
      <div className="bg-white border border-gray-200 rounded-lg p-3 mb-4 flex flex-wrap items-center gap-2">
        {DATE_PRESET_OPTIONS.map(p => (
          <button key={p.key} onClick={() => setPreset(p.key)} className={classNames("px-2.5 py-1.5 rounded-md text-xs font-medium border", preset === p.key ? "bg-brand-700 border-brand-700 text-white" : "border-gray-300 text-gray-600 hover:bg-gray-50")}>{p.label}</button>
        ))}
        {preset === "custom" && (
          <>
            <input type="date" className="text-xs border border-gray-300 rounded px-2 py-1.5" value={customFrom} onChange={e => setCustomFrom(e.target.value)} />
            <span className="text-xs text-gray-400">to</span>
            <input type="date" className="text-xs border border-gray-300 rounded px-2 py-1.5" value={customTo} onChange={e => setCustomTo(e.target.value)} />
          </>
        )}
        <div className="w-px h-6 bg-gray-200 mx-1" />
        <MultiSelectDropdown label="Events" options={eventOptions} selected={eventFilter} onChange={setEventFilter} />
        <select className="text-xs border border-gray-300 rounded-md px-2.5 py-2" value={salesPersonFilter} onChange={e => setSalesPersonFilter(e.target.value)}>
          <option value="all">All Sales People</option>
          {salesPeople.map(sp => <option key={sp.id} value={sp.id}>{sp.name}</option>)}
        </select>
        <select className="text-xs border border-gray-300 rounded-md px-2.5 py-2" value={paymentFilter} onChange={e => setPaymentFilter(e.target.value)}>
          <option value="all">All Payment Methods</option>
          {paymentMethods.map(pm => <option key={pm.id} value={pm.id}>{pm.name}</option>)}
        </select>
      </div>

      {/* KPI cards */}
      <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-3 mb-5">
        {[
          ["Total Sales", formatCurrency(kpi.netRevenue)], ["Total Orders", kpi.totalOrders.toLocaleString()],
          ["Units Sold", kpi.unitsSold.toLocaleString()], ["Avg Order Value", formatCurrency(Math.round(kpi.avgOrderValue))],
          ["Total Giveaways", kpi.giveaways.toLocaleString()], ["Gross Revenue", formatCurrency(kpi.grossRevenue)],
          ["Net Revenue", formatCurrency(kpi.netRevenue)], ["Inventory Value", formatCurrency(Math.round(kpi.inventoryValue))],
        ].map(([label, val]) => (
          <div key={label} className="bg-white border border-gray-200 rounded-lg p-3">
            <div className="text-[10px] text-gray-500 mb-1">{label}</div>
            <div className="text-base font-semibold text-gray-900">{val}</div>
          </div>
        ))}
      </div>

      {/* sales trend */}
      <div className="bg-white border border-gray-200 rounded-lg p-4 mb-4">
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-sm font-semibold text-gray-900">Sales Over Time</h3>
          <div className="flex gap-1 bg-gray-100 rounded-md p-1">
            {GROUPING_OPTIONS.map(([g, label]) => (
              <button key={g} onClick={() => setGrouping(g)} className={classNames("px-2 py-1 rounded text-[11px] font-medium", grouping === g ? "bg-white text-brand-800 shadow-sm" : "text-gray-500 hover:text-gray-700")}>{label}</button>
            ))}
          </div>
        </div>
        <LineChartSVG data={trendData} />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-semibold text-gray-900 mb-3">Sales by Event</h3>
          <BarListChart data={salesByEvent.map(r => ({ label: r.event.name, value: r.revenue }))} />
          <table className="w-full text-xs mt-4">
            <thead className="text-gray-400 text-left border-b border-gray-100"><tr><th className="py-1">Event</th><th className="py-1">Orders</th><th className="py-1">Units</th><th className="py-1">Avg Order</th><th className="py-1">Growth</th></tr></thead>
            <tbody>
              {salesByEvent.map(r => (
                <tr key={r.event.id} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer" onClick={() => setDetailEvent(r.event)}>
                  <td className="py-1.5 font-medium text-gray-800">{r.event.name}</td>
                  <td className="py-1.5">{r.orders}</td>
                  <td className="py-1.5">{r.unitsSold}</td>
                  <td className="py-1.5">{formatCurrency(Math.round(r.avgOrderValue))}</td>
                  <td className={classNames("py-1.5 font-medium", r.growthPct >= 0 ? "text-green-600" : "text-red-500")}>{r.growthPct >= 0 ? "+" : ""}{r.growthPct.toFixed(0)}%</td>
                </tr>
              ))}
              {salesByEvent.length === 0 && <tr><td colSpan={5} className="py-6 text-center text-gray-400">No data.</td></tr>}
            </tbody>
          </table>
        </div>

        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-semibold text-gray-900 mb-3">Payment Method Analytics</h3>
          <div className="flex items-center gap-6">
            <DonutChart data={paymentAgg.map(p => ({ value: p.revenue, color: p.color }))} />
            <div className="flex-1 space-y-1.5">
              {paymentAgg.map(p => (
                <div key={p.name} className="flex items-center gap-2 text-xs">
                  <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: p.color }} />
                  <span className="flex-1 text-gray-600 truncate">{p.name}</span>
                  <span className="text-gray-800 font-medium">{p.pct.toFixed(0)}%</span>
                </div>
              ))}
              {paymentAgg.length === 0 && <p className="text-xs text-gray-400">No data.</p>}
            </div>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-semibold text-gray-900 mb-3">Top 5 Best Selling Products (by Revenue)</h3>
          <BarListChart data={topByRevenue.map(p => ({ label: p.name, value: p.revenue }))} />
          <table className="w-full text-xs mt-3">
            <tbody>
              {topByRevenue.map((p, i) => (
                <tr key={p.name} className="border-t border-gray-50"><td className="py-1 text-gray-400 w-6">#{i + 1}</td><td className="py-1 text-gray-700">{p.name}</td><td className="py-1 text-right text-gray-500">{p.units} units</td><td className="py-1 text-right text-gray-400 w-12">{((p.revenue / totalRevenueForPct) * 100).toFixed(0)}%</td></tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-semibold text-gray-900 mb-3">Top 5 Best Selling Products (by Units)</h3>
          <BarListChart data={topByUnits.map(p => ({ label: p.name, value: p.units }))} valueFormatter={v => v.toLocaleString() + " u"} color="#2563eb" />
          <table className="w-full text-xs mt-3">
            <tbody>
              {topByUnits.map((p, i) => (
                <tr key={p.name} className="border-t border-gray-50"><td className="py-1 text-gray-400 w-6">#{i + 1}</td><td className="py-1 text-gray-700">{p.name}</td><td className="py-1 text-right text-gray-500">{formatCurrency(p.revenue)}</td><td className="py-1 text-right text-gray-400 w-12">{((p.units / totalUnitsForPct) * 100).toFixed(0)}%</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="bg-white border border-gray-200 rounded-lg p-4 mb-4">
        <h3 className="text-sm font-semibold text-gray-900 mb-3">Sales Person Performance</h3>
        <table className="w-full text-xs">
          <thead className="text-gray-400 text-left border-b border-gray-100"><tr><th className="py-1.5">Sales Person</th><th className="py-1.5">Revenue</th><th className="py-1.5">Orders</th><th className="py-1.5">Units Sold</th><th className="py-1.5">Avg Order</th><th className="py-1.5">Best Product</th></tr></thead>
          <tbody>
            {spPerf.map((r, i) => (
              <tr key={r.sp.id} className="border-b border-gray-50">
                <td className="py-1.5 font-medium text-gray-800">{i === 0 && <span className="mr-1">🏆</span>}{r.sp.name}</td>
                <td className="py-1.5">{formatCurrency(r.revenue)}</td>
                <td className="py-1.5">{r.orders}</td>
                <td className="py-1.5">{r.units}</td>
                <td className="py-1.5">{formatCurrency(Math.round(r.avgOrder))}</td>
                <td className="py-1.5 text-gray-500 truncate max-w-[160px]">{r.bestProduct}</td>
              </tr>
            ))}
            {spPerf.length === 0 && <tr><td colSpan={6} className="py-6 text-center text-gray-400">No data.</td></tr>}
          </tbody>
        </table>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-semibold text-gray-900 mb-3">Promotion Analytics {promoAgg[0] && <span className="text-xs font-normal text-gray-400">· Most used: {promoAgg[0].name}</span>}</h3>
          <table className="w-full text-xs">
            <thead className="text-gray-400 text-left border-b border-gray-100"><tr><th className="py-1.5">Promotion</th><th className="py-1.5">Revenue</th><th className="py-1.5">Orders</th><th className="py-1.5">Units</th><th className="py-1.5">Avg Discount</th></tr></thead>
            <tbody>
              {promoAgg.map(r => (
                <tr key={r.name} className="border-b border-gray-50"><td className="py-1.5 font-medium text-gray-800">{r.name}</td><td className="py-1.5">{formatCurrency(r.revenue)}</td><td className="py-1.5">{r.orders}</td><td className="py-1.5">{r.units}</td><td className="py-1.5">{formatCurrency(Math.round(r.avgDiscount))}</td></tr>
              ))}
              {promoAgg.length === 0 && <tr><td colSpan={5} className="py-6 text-center text-gray-400">No promotion usage in this period.</td></tr>}
            </tbody>
          </table>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <h3 className="text-sm font-semibold text-gray-900 mb-3">Low Stock Alert</h3>
          <table className="w-full text-xs">
            <thead className="text-gray-400 text-left border-b border-gray-100"><tr><th className="py-1.5">Product</th><th className="py-1.5">Available</th><th className="py-1.5">Allocated</th><th className="py-1.5">Reorder Qty</th></tr></thead>
            <tbody>
              {lowStockProducts.map(r => (
                <tr key={r.product.id} className="border-b border-gray-50"><td className="py-1.5 text-gray-800">{r.product.name}</td><td className="py-1.5"><Badge color={r.avail <= 0 ? "red" : "amber"}>{r.avail}</Badge></td><td className="py-1.5">{r.allocated}</td><td className="py-1.5 font-medium">{r.reorder}</td></tr>
              ))}
              {lowStockProducts.length === 0 && <tr><td colSpan={4} className="py-6 text-center text-gray-400">No products below threshold ({LOW_STOCK_THRESHOLD}).</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      <div className="bg-white border border-gray-200 rounded-lg p-4 mb-4">
        <h3 className="text-sm font-semibold text-gray-900 mb-3">Recent Orders</h3>
        <table className="w-full text-xs">
          <thead className="text-gray-400 text-left border-b border-gray-100"><tr><th className="py-1.5">Time</th><th className="py-1.5">Order #</th><th className="py-1.5">Sales Person</th><th className="py-1.5">Event</th><th className="py-1.5">Total</th><th className="py-1.5">Payment</th><th className="py-1.5">Status</th></tr></thead>
          <tbody>
            {recentOrders.map(o => (
              <tr key={o.id} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer" onClick={() => setDetailOrder(o)}>
                <td className="py-1.5 text-gray-500 whitespace-nowrap">{formatDateTime(o.createdAt)}</td>
                <td className="py-1.5 font-mono">{o.orderNumber}</td>
                <td className="py-1.5">{o.salesPersonName}</td>
                <td className="py-1.5">{o.eventName}</td>
                <td className="py-1.5 font-medium">{formatCurrency(o.total)}</td>
                <td className="py-1.5">{o.paymentMethod}</td>
                <td className="py-1.5"><Badge color="green">{o.status}</Badge></td>
              </tr>
            ))}
            {recentOrders.length === 0 && <tr><td colSpan={7} className="py-6 text-center text-gray-400">No orders in this period.</td></tr>}
          </tbody>
        </table>
      </div>

      <div className="bg-white border border-gray-200 rounded-lg p-4">
        <h3 className="text-sm font-semibold text-gray-900 mb-3">Export Reports <span className="text-xs font-normal text-gray-400">— respects the filters above</span></h3>
        <div className="space-y-2">
          {REPORT_TYPES.map(([type, label]) => (
            <div key={type} className="flex items-center justify-between text-sm border border-gray-100 rounded-md px-3 py-2">
              <span className="text-gray-700">{label}</span>
              <div className="flex gap-1.5">
                {["xlsx", "csv", "pdf"].map(fmt => (
                  <button key={fmt} onClick={() => exportReport(type, fmt)} className="px-2 py-1 text-xs border border-gray-300 rounded hover:bg-gray-50 uppercase text-gray-600">{fmt}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      <EventDetailModal event={detailEvent} orders={orders} onClose={() => setDetailEvent(null)} />
      <OrderDetailModal order={detailOrder} onClose={() => setDetailOrder(null)} allowDuplicate={false}
        onRefund={refundOrder} onCancelDraft={cancelDraft}
        onEdit={o => { setDetailOrder(null); setEditOrderTarget(o); }}
        onDelete={o => { setDetailOrder(null); setDeleteOrderTargets([o]); }} />
      <EditOrderModal order={editOrderTarget} events={events} salesPeople={salesPeople} paymentMethods={paymentMethods} onSave={saveOrderEdit} onClose={() => setEditOrderTarget(null)} />
      <DeleteOrderDialog ordersToDelete={deleteOrderTargets} onClose={() => setDeleteOrderTargets(null)} onConfirm={restock => deleteOrders(deleteOrderTargets.map(o => o.id), restock)} />
      <Toast toasts={toasts} />
    </div>
  );
}

/* =========================================================================
   SETTINGS VIEW — manage Events / Sales People / Payment Methods
   ========================================================================= */
function EventForm({ initial, onSave, onCancel }) {
  const isEdit = initial && initial.id;
  const [form, setForm] = useState(() => isEdit ? { name: initial.name, date: (initial.date || "").slice(0, 10), location: initial.location || "" } : { name: "", date: new Date().toISOString().slice(0, 10), location: "" });
  const [error, setError] = useState("");
  function set(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function submit() {
    if (!form.name.trim()) { setError("Event name is required."); return; }
    onSave({ name: form.name.trim(), date: form.date ? new Date(form.date).toISOString() : new Date().toISOString(), location: form.location.trim() });
  }
  return (
    <div>
      <Field label="Event Name *"><input className={inputCls} value={form.name} onChange={e => set("name", e.target.value)} autoFocus /></Field>
      <Field label="Date"><input type="date" className={inputCls} value={form.date} onChange={e => set("date", e.target.value)} /></Field>
      <Field label="Location"><input className={inputCls} value={form.location} onChange={e => set("location", e.target.value)} placeholder="e.g. Bangkok" /></Field>
      {error && <p className="text-xs text-red-600 mb-2">{error}</p>}
      <div className="flex justify-end gap-2 pt-2"><Button variant="outline" onClick={onCancel}>Cancel</Button><Button onClick={submit}>{isEdit ? "Save Changes" : "Add Event"}</Button></div>
    </div>
  );
}
function SalesPersonForm({ initial, onSave, onCancel }) {
  const isEdit = initial && initial.id;
  const [form, setForm] = useState(() => isEdit ? { name: initial.name, position: initial.position } : { name: "", position: "" });
  const [error, setError] = useState("");
  function set(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function submit() {
    if (!form.name.trim()) { setError("Name is required."); return; }
    onSave({ name: form.name.trim(), position: form.position.trim() || "Sales Associate" });
  }
  return (
    <div>
      <Field label="Name *"><input className={inputCls} value={form.name} onChange={e => set("name", e.target.value)} autoFocus /></Field>
      <Field label="Position"><input className={inputCls} value={form.position} onChange={e => set("position", e.target.value)} placeholder="e.g. Sales Associate" /></Field>
      {error && <p className="text-xs text-red-600 mb-2">{error}</p>}
      <div className="flex justify-end gap-2 pt-2"><Button variant="outline" onClick={onCancel}>Cancel</Button><Button onClick={submit}>{isEdit ? "Save Changes" : "Add Sales Person"}</Button></div>
    </div>
  );
}
function PaymentMethodForm({ initial, onSave, onCancel }) {
  const isEdit = initial && initial.id;
  const [name, setName] = useState(isEdit ? initial.name : "");
  const [error, setError] = useState("");
  function submit() {
    if (!name.trim()) { setError("Method name is required."); return; }
    onSave({ name: name.trim() });
  }
  return (
    <div>
      <Field label="Method Name *"><input className={inputCls} value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Alipay" autoFocus /></Field>
      {error && <p className="text-xs text-red-600 mb-2">{error}</p>}
      <div className="flex justify-end gap-2 pt-2"><Button variant="outline" onClick={onCancel}>Cancel</Button><Button onClick={submit}>{isEdit ? "Save Changes" : "Add Method"}</Button></div>
    </div>
  );
}

function SettingsView({ events, setEvents, salesPeople, setSalesPeople, paymentMethods, setPaymentMethods, orders }) {
  const [subTab, setSubTab] = useState("events");
  const [editEvent, setEditEvent] = useState(null);
  const [editSP, setEditSP] = useState(null);
  const [editPM, setEditPM] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null); // { type, id, name, usage }
  const [toasts, setToasts] = useState([]);
  function pushToast(message) {
    const id = genId("t");
    setToasts(t => [...t, { id, message }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2600);
  }

  function usageCount(type, id) {
    if (type === "event") return orders.filter(o => o.eventId === id).length;
    if (type === "salesperson") return orders.filter(o => o.salesPersonId === id).length;
    if (type === "payment") return orders.filter(o => o.paymentMethodId === id).length;
    return 0;
  }

  function saveEvent(data) {
    if (editEvent && editEvent.id) { setEvents(es => es.map(e => e.id === editEvent.id ? { ...e, ...data } : e)); pushToast("Event updated"); }
    else { setEvents(es => [...es, { id: genId("ev"), ...data }]); pushToast("Event created"); }
    setEditEvent(null);
  }
  function saveSP(data) {
    if (editSP && editSP.id) { setSalesPeople(sp => sp.map(s => s.id === editSP.id ? { ...s, ...data } : s)); pushToast("Sales person updated"); }
    else { setSalesPeople(sp => [...sp, { id: genId("sp"), ...data }]); pushToast("Sales person added"); }
    setEditSP(null);
  }
  function savePM(data) {
    if (editPM && editPM.id) { setPaymentMethods(pm => pm.map(p => p.id === editPM.id ? { ...p, ...data } : p)); pushToast("Payment method updated"); }
    else { setPaymentMethods(pm => [...pm, { id: genId("pm"), builtIn: false, ...data }]); pushToast("Payment method added"); }
    setEditPM(null);
  }
  function confirmDeleteAction() {
    const { type, id } = confirmDelete;
    if (type === "event") setEvents(es => es.filter(e => e.id !== id));
    else if (type === "salesperson") setSalesPeople(sp => sp.filter(s => s.id !== id));
    else if (type === "payment") setPaymentMethods(pm => pm.filter(p => p.id !== id));
    pushToast("Deleted");
    setConfirmDelete(null);
  }

  const SUB_TABS = [["events", "Events"], ["salespeople", "Sales People"], ["payments", "Payment Methods"]];

  return (
    <div className="px-6 py-5 max-w-[1000px] mx-auto">
      <div className="flex items-center gap-1 bg-gray-100 rounded-md p-1 mb-4 w-fit">
        {SUB_TABS.map(([k, label]) => (
          <button key={k} onClick={() => setSubTab(k)} className={classNames("px-3.5 py-1.5 rounded text-sm font-medium", subTab === k ? "bg-white text-brand-800 shadow-sm" : "text-gray-500 hover:text-gray-700")}>{label}</button>
        ))}
      </div>

      {subTab === "events" && (
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-gray-900">Events</h3>
            <Button size="sm" onClick={() => setEditEvent({})}><Icon name="plus" className="w-3.5 h-3.5" />Add Event</Button>
          </div>
          <table className="w-full text-sm">
            <thead className="text-gray-400 text-left border-b border-gray-100 text-xs"><tr><th className="py-1.5">Name</th><th className="py-1.5">Date</th><th className="py-1.5">Location</th><th className="py-1.5">Orders</th><th className="py-1.5 text-right">Actions</th></tr></thead>
            <tbody>
              {events.map(ev => (
                <tr key={ev.id} className="border-b border-gray-50">
                  <td className="py-2 font-medium text-gray-800">{ev.name}</td>
                  <td className="py-2 text-gray-500">{formatDate(ev.date)}</td>
                  <td className="py-2 text-gray-500">{ev.location || "—"}</td>
                  <td className="py-2 text-gray-500">{usageCount("event", ev.id)}</td>
                  <td className="py-2 text-right">
                    <button onClick={() => setEditEvent(ev)} className="p-1.5 rounded hover:bg-gray-100 text-gray-500"><Icon name="edit" className="w-3.5 h-3.5" /></button>
                    <button onClick={() => setConfirmDelete({ type: "event", id: ev.id, name: ev.name, usage: usageCount("event", ev.id) })} className="p-1.5 rounded hover:bg-red-50 text-red-500"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                  </td>
                </tr>
              ))}
              {events.length === 0 && <tr><td colSpan={5} className="py-8 text-center text-gray-400">No events yet.</td></tr>}
            </tbody>
          </table>
        </div>
      )}

      {subTab === "salespeople" && (
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-gray-900">Sales People</h3>
            <Button size="sm" onClick={() => setEditSP({})}><Icon name="plus" className="w-3.5 h-3.5" />Add Sales Person</Button>
          </div>
          <table className="w-full text-sm">
            <thead className="text-gray-400 text-left border-b border-gray-100 text-xs"><tr><th className="py-1.5">Name</th><th className="py-1.5">Position</th><th className="py-1.5">Orders</th><th className="py-1.5 text-right">Actions</th></tr></thead>
            <tbody>
              {salesPeople.map(sp => (
                <tr key={sp.id} className="border-b border-gray-50">
                  <td className="py-2 font-medium text-gray-800">{sp.name}</td>
                  <td className="py-2 text-gray-500">{sp.position}</td>
                  <td className="py-2 text-gray-500">{usageCount("salesperson", sp.id)}</td>
                  <td className="py-2 text-right">
                    <button onClick={() => setEditSP(sp)} className="p-1.5 rounded hover:bg-gray-100 text-gray-500"><Icon name="edit" className="w-3.5 h-3.5" /></button>
                    <button onClick={() => setConfirmDelete({ type: "salesperson", id: sp.id, name: sp.name, usage: usageCount("salesperson", sp.id) })} className="p-1.5 rounded hover:bg-red-50 text-red-500"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                  </td>
                </tr>
              ))}
              {salesPeople.length === 0 && <tr><td colSpan={4} className="py-8 text-center text-gray-400">No sales people yet.</td></tr>}
            </tbody>
          </table>
        </div>
      )}

      {subTab === "payments" && (
        <div className="bg-white border border-gray-200 rounded-lg p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-gray-900">Payment Methods</h3>
            <Button size="sm" onClick={() => setEditPM({})}><Icon name="plus" className="w-3.5 h-3.5" />Add Method</Button>
          </div>
          <table className="w-full text-sm">
            <thead className="text-gray-400 text-left border-b border-gray-100 text-xs"><tr><th className="py-1.5">Name</th><th className="py-1.5">Orders</th><th className="py-1.5 text-right">Actions</th></tr></thead>
            <tbody>
              {paymentMethods.map(pm => (
                <tr key={pm.id} className="border-b border-gray-50">
                  <td className="py-2 font-medium text-gray-800">{pm.name} {pm.builtIn && <Badge color="gray">default</Badge>}</td>
                  <td className="py-2 text-gray-500">{usageCount("payment", pm.id)}</td>
                  <td className="py-2 text-right">
                    <button onClick={() => setEditPM(pm)} className="p-1.5 rounded hover:bg-gray-100 text-gray-500"><Icon name="edit" className="w-3.5 h-3.5" /></button>
                    <button onClick={() => setConfirmDelete({ type: "payment", id: pm.id, name: pm.name, usage: usageCount("payment", pm.id) })} className="p-1.5 rounded hover:bg-red-50 text-red-500"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                  </td>
                </tr>
              ))}
              {paymentMethods.length === 0 && <tr><td colSpan={3} className="py-8 text-center text-gray-400">No payment methods yet.</td></tr>}
            </tbody>
          </table>
        </div>
      )}

      <Modal open={!!editEvent} onClose={() => setEditEvent(null)} title={editEvent && editEvent.id ? "Edit Event" : "Add Event"} width="max-w-md">
        <EventForm initial={editEvent} onSave={saveEvent} onCancel={() => setEditEvent(null)} />
      </Modal>
      <Modal open={!!editSP} onClose={() => setEditSP(null)} title={editSP && editSP.id ? "Edit Sales Person" : "Add Sales Person"} width="max-w-md">
        <SalesPersonForm initial={editSP} onSave={saveSP} onCancel={() => setEditSP(null)} />
      </Modal>
      <Modal open={!!editPM} onClose={() => setEditPM(null)} title={editPM && editPM.id ? "Edit Payment Method" : "Add Payment Method"} width="max-w-sm">
        <PaymentMethodForm initial={editPM} onSave={savePM} onCancel={() => setEditPM(null)} />
      </Modal>
      <ConfirmDialog
        open={!!confirmDelete}
        title={`Delete ${confirmDelete?.name || ""}`}
        danger
        confirmLabel="Delete"
        message={`This will permanently remove "${confirmDelete?.name}" from the list.${confirmDelete?.usage ? ` It is referenced by ${confirmDelete.usage} existing order(s) — those orders keep their historical record and are not affected.` : ""}`}
        onCancel={() => setConfirmDelete(null)}
        onConfirm={confirmDeleteAction}
      />
      <Toast toasts={toasts} />
    </div>
  );
}

/* =========================================================================
   TOP NAV (shared shell across Inventory / POS / Dashboard)
   ========================================================================= */
const NAV_TABS = [
  { key: "inventory", label: "Inventory", icon: "box" },
  { key: "pos", label: "POS", icon: "package" },
  { key: "dashboard", label: "Dashboard", icon: "filter" },
  { key: "settings", label: "Settings", icon: "user" },
];
function TopNav({ tab, setTab, currentUser, onLogout }) {
  return (
    <div className="sticky top-0 z-30 bg-white border-b border-gray-200">
      <div className="px-6 h-14 flex items-center justify-between gap-4">
        <div className="flex items-center gap-2.5 shrink-0">
          <div className="w-8 h-8 rounded-md bg-brand-700 flex items-center justify-center text-white"><Icon name="box" className="w-4.5 h-4.5" /></div>
          <div className="hidden md:block">
            <div className="text-sm font-semibold text-gray-900 leading-tight">Powerlife</div>
            <div className="text-[11px] text-gray-400 leading-tight">Event POS System</div>
          </div>
        </div>
        <nav className="flex items-center gap-1 bg-gray-100 rounded-md p-1">
          {NAV_TABS.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)}
              className={classNames("px-3.5 py-1.5 rounded text-sm font-medium transition-colors", tab === t.key ? "bg-white text-brand-800 shadow-sm" : "text-gray-500 hover:text-gray-700")}>
              {t.label}
            </button>
          ))}
        </nav>
        <div className="flex items-center gap-3 shrink-0">
          <div className="text-right leading-tight hidden sm:block">
            <div className="text-xs font-medium text-gray-800">{currentUser.name}</div>
            <div className="text-[11px] text-gray-400">{currentUser.role}</div>
          </div>
          <div className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-500"><Icon name="user" className="w-4 h-4" /></div>
          <button onClick={onLogout} className="p-2 rounded hover:bg-gray-100 text-gray-500" title="Sign out"><Icon name="logout" className="w-4 h-4" /></button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   MAIN APP (owns all shared state: products, events, sales people, payment
   methods, orders — Inventory / POS / Dashboard are just different views
   over this same data, per requirement that everything lives in one app).
   ========================================================================= */
function MainApp({ currentUser, onLogout }) {
  const [tab, setTab] = useState("inventory");

  // Generate each seed list exactly once via refs, then reuse the SAME
  // instances for both the live state and the historical order generator —
  // otherwise seeded orders would reference orphaned ids from a separate
  // generation call, silently breaking id-based filters.
  const eventsRef = useRef(generateSeedEvents());
  const salesPeopleRef = useRef(generateSeedSalesPeople());
  const paymentMethodsRef = useRef(generateSeedPaymentMethods());
  const [events, setEvents] = useState(eventsRef.current);
  const [products, setProducts] = useState(() => generateSeedProducts(eventsRef.current, 3000));
  const [salesPeople, setSalesPeople] = useState(salesPeopleRef.current);
  const [paymentMethods, setPaymentMethods] = useState(paymentMethodsRef.current);
  const [orders, setOrders] = useState(() => generateSeedOrders(products, eventsRef.current, salesPeopleRef.current, paymentMethodsRef.current));

  return (
    <div className="min-h-screen">
      <TopNav tab={tab} setTab={setTab} currentUser={currentUser} onLogout={onLogout} />
      {tab === "inventory" && (
        <InventoryView currentUser={currentUser} products={products} setProducts={setProducts} events={events} />
      )}
      {tab === "pos" && (
        <POSView currentUser={currentUser} products={products} setProducts={setProducts} events={events}
          salesPeople={salesPeople} paymentMethods={paymentMethods} setPaymentMethods={setPaymentMethods}
          orders={orders} setOrders={setOrders} />
      )}
      {tab === "dashboard" && (
        <DashboardView currentUser={currentUser} products={products} setProducts={setProducts} events={events} salesPeople={salesPeople}
          paymentMethods={paymentMethods} orders={orders} setOrders={setOrders} />
      )}
      {tab === "settings" && (
        <SettingsView events={events} setEvents={setEvents} salesPeople={salesPeople} setSalesPeople={setSalesPeople}
          paymentMethods={paymentMethods} setPaymentMethods={setPaymentMethods} orders={orders} />
      )}
    </div>
  );
}

/* =========================================================================
   ROOT
   ========================================================================= */
function App() {
  const [currentUser, setCurrentUser] = useState(null);
  if (!currentUser) return <LoginScreen onLogin={setCurrentUser} />;
  return <MainApp currentUser={currentUser} onLogout={() => setCurrentUser(null)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
